                  <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                    <label style={{ fontSize:11, color:'var(--muted)', fontWeight:600 }}>TRANSIÇÃO DE ENTRADA</label>
                    <select className="editor-select" value={selectedClip.transition || 'none'} onChange={e => updateSelectedClip({ transition: e.target.value })}>
                      <option value="none">Corte Seco</option>
                      <option value="dissolve">Dissolver (Misturar)</option>
                      <option value="fadeblack">Mergulho no Preto (Fade Black)</option>
                      <option value="fadewhite">Clarão Branco (Fade White)</option>
                      <option value="crossfade">Crossfade Suave</option>
                      <option value="pixelize">Pixelizar</option>
                      <option value="radial">Radial</option>
                      <option value="slideleft">Deslizar Esquerda</option>
                      <option value="slideright">Deslizar Direita</option>
                      <option value="slideup">Deslizar Cima</option>
                      <option value="slidedown">Deslizar Baixo</option>
                      <option value="smoothleft">Smooth Esquerda</option>
                      <option value="smoothright">Smooth Direita</option>
                      <option value="smoothup">Smooth Cima</option>
                      <option value="smoothdown">Smooth Baixo</option>
                      <option value="wipeleft">Wipe Esquerda</option>
                      <option value="wiperight">Wipe Direita</option>
                      <option value="wipeup">Wipe Cima</option>
                      <option value="wipedown">Wipe Baixo</option>
                      <option value="diagtl">Diagonal Topo Esq.</option>
                      <option value="diagtr">Diagonal Topo Dir.</option>
                      <option value="diagbl">Diagonal Baixo Esq.</option>
                      <option value="diagbr">Diagonal Baixo Dir.</option>
                      <option value="circleopen">Íris Abrir</option>
                      <option value="circleclose">Íris Fechar</option>
                      <option value="horzopen">Abrir Horizontal</option>
                      <option value="horzclose">Fechar Horizontal</option>
                      <option value="vertopen">Abrir Vertical</option>
                      <option value="vertclose">Fechar Vertical</option>
                      <option value="hlslice">Fatias Horiz. Esq.</option>
                      <option value="hrslice">Fatias Horiz. Dir.</option>
                      <option value="vuslice">Fatias Vert. Cima</option>
                      <option value="vdslice">Fatias Vert. Baixo</option>
                    </select>

                    {selectedClip.transition && selectedClip.transition !== 'none' && (
                      <div style={{ marginTop: 8 }}>
                        <label style={{ fontSize:11, color:'var(--muted)', display:'flex', justifyContent:'space-between', fontWeight:600 }}>
                          <span>DURAÇÃO DA TRANSIÇÃO</span>
                          <span className="mono">{selectedClip.transitionDuration ?? 0.8}s</span>
                        </label>
                        <input type="range" min="0.1" max="3.0" step="0.1" style={{ width:'100%', marginTop:8, accentColor:'var(--accent2)' }}
                          value={selectedClip.transitionDuration ?? 0.8}
                          onChange={e => updateSelectedClip({ transitionDuration: parseFloat(e.target.value) })}
                        />
                      </div>
                    )}

                    <button className="btn btn-ghost" style={{ fontSize:11, marginTop:8, justifyContent:'center' }} onClick={() => applyToAllVideos({ transition: selectedClip.transition, transitionDuration: selectedClip.transitionDuration ?? 0.8 })}>✦ Aplicar a todos</button>
                    <button className="btn btn-gold" style={{ fontSize:11, justifyContent:'center' }} onClick={applyTransitionCycle}>Sequência automática</button>
                  </div>
                )}
                {rightPanelTab === 'Transições' && selectedClip.trackId !== 'video-1' && (
                  <div style={{ color:'var(--muted)', fontSize:11, textAlign:'center' }}>Transições apenas aplicáveis em vídeo.</div>
                )}

                {/* GUIA ÁUDIO */}
                {rightPanelTab === 'Áudio' && (
                  <div style={{ display:'flex', flexDirection:'column', gap:20 }}>
                    <div>
                      <label style={{ fontSize:11, color:'var(--muted)', display:'flex', justifyContent:'space-between', fontWeight:600 }}>
                        <span>VOLUME GLOBAL</span>
                        <span className="mono">{Math.round(getClipVolume(selectedClip, selectedClip.trackId === 'audio-2' ? 0.2 : 1.0) * 100)}%</span>
                      </label>
                      <input type="range" min="0" max="1" step="0.05" style={{ width:'100%', marginTop:8, accentColor:'var(--accent2)' }}
                        value={getClipVolume(selectedClip, selectedClip.trackId === 'audio-2' ? 0.2 : 1.0)}
                        onChange={e => {
                          const v = parseFloat(e.target.value);
                          updateSelectedClip({ volume: v });
                          setVolumes(p => ({ ...p, [selectedId]: v }));
                          if (selectedClip.trackId === 'audio-1' && narrationRef.current) narrationRef.current.volume = v;
                          if (selectedClip.trackId === 'audio-2' && bgmRef.current) bgmRef.current.volume = v;
                        }}
                      />
                    </div>

                    <div>
                      <label style={{ fontSize:11, color:'var(--muted)', display:'flex', justifyContent:'space-between', fontWeight:600 }}>
                        <span>DUCKING DE BGM</span>
                        <span className="mono">{duckingEnabled ? 'ON' : 'OFF'}</span>
                      </label>
                      <button className={`btn ${duckingEnabled ? 'btn-primary' : 'btn-ghost'}`} style={{ width:'100%', padding:'8px 8px', fontSize:11 }}
                        onClick={() => setDuckingEnabled(p => !p)}>
                        {duckingEnabled ? 'Desativar Ducking' : 'Ativar Ducking'}
                      </button>
                    </div>

                    <div>
                      <label style={{ fontSize:11, color:'var(--muted)', display:'flex', justifyContent:'space-between', fontWeight:600 }}>
                        <span>FADE IN (Início)</span>
                        <span className="mono">{selectedClip.fadeIn || 0}s</span>
                      </label>
                      <input type="range" min="0" max="5" step="0.5" style={{ width:'100%', marginTop:8, accentColor:'var(--accent2)' }}
                        value={selectedClip.fadeIn || 0}
                        onChange={e => updateSelectedClip({ fadeIn: parseFloat(e.target.value) })}
                      />
                    </div>

                    <div>
                      <label style={{ fontSize:11, color:'var(--muted)', display:'flex', justifyContent:'space-between', fontWeight:600 }}>
                        <span>FADE OUT (Fim)</span>
                        <span className="mono">{selectedClip.fadeOut || 0}s</span>
                      </label>
                      <input type="range" min="0" max="5" step="0.5" style={{ width:'100%', marginTop:8, accentColor:'var(--accent2)' }}
                        value={selectedClip.fadeOut || 0}
                        onChange={e => updateSelectedClip({ fadeOut: parseFloat(e.target.value) })}
                      />
                    </div>
                  </div>
                )}
              </>
            )}
          </div>
        </div>

      </div>

      {/* ── TIMELINE ── */}
      <div style={{ height:220, background:'var(--surface)', borderTop:'1px solid var(--border)', display:'flex', flexDirection:'column', flexShrink:0 }}>

        {/* controles */}
        <div style={{ height:38, borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', padding:'0 10px', background:'var(--bg)' }}>
          
          {/* Esquerda: Ferramentas de Histórico */}
          <div style={{ display:'flex', alignItems:'center', gap:8, flex:1 }}>
            <button className="btn btn-ghost" style={{ padding:'4px 8px', fontSize:14 }} disabled={past.length === 0} onClick={undo} title="Desfazer (Ctrl+Z)">⟲</button>
            <button className="btn btn-ghost" style={{ padding:'4px 8px', fontSize:14 }} disabled={future.length === 0} onClick={redo} title="Refazer (Ctrl+Y)">⟳</button>
          </div>

          {/* Centro: Playback (Play, Pause, Stop) */}
          <div style={{ display:'flex', alignItems:'center', gap:8, justifyContent:'center' }}>
            <button className="btn btn-ghost" style={{ padding:'4px 8px' }} title="Stop / Início" onClick={() => { setIsPlaying(false); setCurrentTime(0); if(narrationRef.current){narrationRef.current.pause();narrationRef.current.currentTime=0;} if(bgmRef.current){bgmRef.current.pause();bgmRef.current.currentTime=0;} }}>⏮</button>
            <button className="btn btn-ghost" style={{ padding:'4px 10px' }} title="Play / Pause" onClick={() => setIsPlaying(p => !p)}>
              {isPlaying ? '⏸' : '▶'}
            </button>
          </div>

          {/* Direita: Ferramentas de Timeline */}
          <div style={{ display:'flex', alignItems:'center', gap:6, flex:1, justifyContent:'flex-end' }}>
            <button className="btn btn-ghost" style={{ padding:'4px 8px', fontSize:11 }} onClick={() => {
              setPast(p => [...p, clips]); setFuture([]);
              setClips(prev => {
                let t = 0;
                return [...prev].sort((a,b) => a.startTime - b.startTime).map(c => {
                  if (c.trackId === 'video-1') {
                    const start = t;
                    t += c.duration;
                    return { ...c, startTime: start };
                  }
                  return c;
                });
              });
            }} title="Juntar todas as cenas (Remover espaços vazios na linha de vídeo)">&gt;&lt; Juntar</button>
            <div style={{ width:1, height:20, background:'var(--border)' }}/>
            <button className={`btn ${snapOn ? 'btn-primary' : 'btn-ghost'}`} style={{ padding:'4px 8px', fontSize:11 }} onClick={() => setSnapOn(p => !p)} title="Ímã Automático (S)">🧲 {snapOn ? 'ON' : 'OFF'}</button>
            <button className="btn btn-ghost" style={{ padding:'4px 8px', fontSize:11 }} onClick={() => setZoom(z => Math.max(z - 0.25, 0.25))} title="Zoom out (Ctrl+-)">−</button>
            <span className="mono" style={{ fontSize:10, color:'var(--muted)', minWidth:32, textAlign:'center' }}>{Math.round(zoom * 100)}%</span>
            <button className="btn btn-ghost" style={{ padding:'4px 8px', fontSize:11 }} onClick={() => setZoom(z => Math.min(z + 0.25, 4))} title="Zoom in (Ctrl++)">+</button>
            <button className="btn btn-ghost" style={{ padding:'4px 6px', fontSize:10 }} onClick={() => setZoom(1)} title="Reset zoom">↺</button>
            <div style={{ width:1, height:20, background:'var(--border)' }}/>
            <button className="btn btn-ghost" style={{ padding:'4px 8px', fontSize:11 }} onClick={() => setFullscreen(p => !p)} title="Tela cheia (F)">⛶</button>
            <button className="btn btn-danger" style={{ padding:'4px 8px' }} disabled={!selectedId} onClick={() => { 
              setPast(p => [...p, clips]); setFuture([]); 
              setClips(prev => {
                const clipToDelete = prev.find(c => c.id === selectedId);
                let nextClips = prev.filter(c => c.id !== selectedId);
                if (clipToDelete && snapOn) {
                  const delta = -clipToDelete.duration;
                  nextClips = nextClips.map(c => {
                    if (c.trackId === clipToDelete.trackId && c.startTime > clipToDelete.startTime) {
                      return { ...c, startTime: Math.max(0, c.startTime + delta) };
                    }
                    return c;
                  });
                }
                return nextClips;
              });
              setSelectedId(null); 
            }}>🗑</button>
          </div>
        </div>

        {/* trilhas */}
        <div style={{ display:'flex', flex:1, overflow:'hidden' }}>
          {/* labels */}
          <div style={{ width:150, flexShrink:0, borderRight:'1px solid var(--border)' }}>
            <div style={{ height:22, borderBottom:'1px solid var(--border)', background:'var(--bg)' }}/>
            {TRACKS.map(t => (
              <div key={t.id} className="track-row" style={{ display:'flex', alignItems:'center', paddingLeft:10, background:t.color }}>
                <span style={{ fontFamily:'Rajdhani', fontSize:12, letterSpacing:0.5, color:'var(--text)', fontWeight:600 }}>{t.name}</span>
              </div>
            ))}
          </div>

          {/* área de clips */}
          <div style={{ flex:1, overflowX:'auto', position:'relative', userSelect:'none' }} ref={timelineRef}
               onClick={e => {
                 if (dragState) return;
                 const rect = timelineRef.current.getBoundingClientRect();
                 setCurrentTime(Math.max(0, (e.clientX - rect.left + timelineRef.current.scrollLeft) / (PPS * zoom)));
                 setSelectedId(null);
               }}
               onDragOver={e => e.preventDefault()}
               onDrop={onTimelineDrop}>
            <div style={{ position:'relative', width: Math.max(duration * PPS * zoom, 1200), height:'100%' }}>
              {/* régua */}
              <div style={{ height:22, background:'var(--bg)', borderBottom:'1px solid var(--border)', position:'relative' }}>
                {Array.from({ length: Math.ceil(duration) }).map((_,i) => (
                  <div key={i} style={{ position:'absolute', left: i * PPS * zoom, height:'100%', borderLeft:'1px solid var(--border)', paddingLeft:3 }}>
                    {(i % Math.max(1, Math.round(5/zoom)) === 0) && <span className="mono" style={{ fontSize:9, color:'var(--muted)' }}>{i}s</span>}
                  </div>
                ))}
              </div>

              {/* trilhas */}
              {TRACKS.map(track => (
                <div key={track.id} className="track-row" style={{ background: track.color }}>
                  {clips.filter(c => c.trackId === track.id).map(clip => {
                    const isSelected = clip.id === selectedId;
                    const isAudio    = track.type === 'audio';
                    const clipMedia  = library.find(m => m.id === clip.mediaId);
                    const bgColor    = isSelected
                      ? (isAudio ? 'rgba(0,200,117,0.4)' : 'rgba(45,107,228,0.5)')
                      : (isAudio ? 'rgba(0,200,117,0.15)' : 'rgba(45,107,228,0.2)');
                    const borderColor = isSelected
                      ? (isAudio ? '#00c875' : 'var(--accent2)')
                      : (isAudio ? 'rgba(0,200,117,0.5)' : 'var(--accent)');
                    return (
                      <div key={clip.id}
                           onMouseDown={e => onClipMouseDown(e, clip.id, 'move')}
                           onClick={e => e.stopPropagation()}
                           style={{
                             position:'absolute', top:3, bottom:3,
                             left: clip.startTime * PPS * zoom,
                             width: Math.max(clip.duration * PPS * zoom, 10),
                             background: bgColor,
                             border: `1px solid ${borderColor}`,
                             borderRadius:2, cursor:'grab', overflow:'hidden',
                             boxShadow: isSelected ? `0 0 10px ${isAudio ? 'rgba(0,200,117,0.3)' : 'rgba(0,212,255,0.3)'}` : 'none',
                           }}>
                        {/* resize left */}
                        <div onMouseDown={e => { e.stopPropagation(); onClipMouseDown(e, clip.id, 'resize-left'); }}
                             style={{ position:'absolute', left:0, top:0, bottom:0, width:12, cursor:'ew-resize', display:'flex', alignItems:'center', justifyContent:'flex-start', paddingLeft: 2, zIndex:5 }}>
                          <div style={{ width: 3, height: 16, borderLeft: isSelected ? '1px solid var(--accent2)' : '1px solid rgba(255,255,255,0.4)', borderRight: isSelected ? '1px solid var(--accent2)' : '1px solid rgba(255,255,255,0.4)' }} />
                        </div>

                        {(() => {
                          const media = library.find(m => m.id === clip.mediaId);
                          const isAud = track.type === 'audio';
                          return (
                            <div style={{ display:'flex', alignItems:'center', height:'100%', overflow:'hidden', position:'relative', padding: '0 14px' }}>
                              {/* Waveform para áudio */}
                              {isAud && (
                                <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', gap:1, padding:'2px 4px', opacity:0.4 }}>
                                  {Array.from({length: Math.min(80, Math.floor(clip.duration * PPS * zoom / 4))}).map((_,i) => (
                                    <div key={i} style={{
                                      width:2, flexShrink:0,
                                      height: `${20 + Math.sin(i * 0.8) * 15 + Math.sin(i * 2.1) * 10 + Math.random() * 5}%`,
                                      background: isSelected ? '#00c875' : 'rgba(0,200,117,0.8)',
                                      borderRadius:1,
                                    }}/>
                                  ))}
                                </div>
                              )}
                              {/* Thumbnail para imagens */}
                              {!isAud && media?.url && media.type?.startsWith('image') && (
                                <img src={media.url} alt=""
                                  style={{ height:'100%', width:'auto', maxWidth:40, objectFit:'cover', opacity:0.8, flexShrink:0 }}/>
                              )}
                              <span style={{ padding:'2px 6px', fontSize:10, color:'var(--text)', fontFamily:'Rajdhani', fontWeight:600, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', position:'relative', zIndex:1, textShadow: theme === 'dark' ? '0 1px 3px rgba(0,0,0,0.8)' : '0 1px 3px rgba(255,255,255,0.8)' }}>
                                {media?.name || '—'}
                              </span>
                            </div>
                          );
                        })()}

                        {/* Indicador de Transição */}
                        {!isAudio && clip.transition && clip.transition !== 'none' && (
                          <div style={{ position:'absolute', right:0, top:0, bottom:0, width:12, background:'rgba(0,212,255,0.3)', borderLeft:'1px dashed var(--accent2)', zIndex:2 }} title={`Transição: ${clip.transition}`} />
                        )}

                        {/* resize right */}
                        <div onMouseDown={e => { e.stopPropagation(); onClipMouseDown(e, clip.id, 'resize-right'); }}
                             style={{ position:'absolute', right:0, top:0, bottom:0, width:12, cursor:'ew-resize', display:'flex', alignItems:'center', justifyContent:'flex-end', paddingRight: 2, zIndex:5 }}>
                          <div style={{ width: 3, height: 16, borderLeft: isSelected ? '1px solid var(--accent2)' : '1px solid rgba(255,255,255,0.4)', borderRight: isSelected ? '1px solid var(--accent2)' : '1px solid rgba(255,255,255,0.4)' }} />
                        </div>
                      </div>
                    );
                  })}
                </div>
              ))}

              {/* playhead */}
              <div style={{ position:'absolute', top:0, bottom:0, left: currentTime * PPS * zoom, width:1, background:'var(--danger)', zIndex:20, pointerEvents:'none' }}>
                <div style={{ width:8, height:8, background:'var(--danger)', transform:'translateX(-3.5px) rotate(45deg)', marginTop:16 }}/>
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* ══════════════════════════════════════════════════════════════════
            MODAL: ENVIAR AO MOTOR
      ══════════════════════════════════════════════════════════════════ */}
      {modal === 'ai' && (
        <div className="modal-overlay" onClick={() => !aiStatus.running && setModal(null)}>
          <div className="modal animate-fade" onClick={e => e.stopPropagation()} style={{ maxWidth:520 }}>
            <div className="modal-header">
              <span className="modal-title">✦ Enviar ao Motor de Dobra</span>
              {!aiStatus.running && <button className="btn btn-ghost" style={{ padding:'2px 6px' }} onClick={() => setModal(null)}>✕</button>}
            </div>
            <div className="modal-body">

              {!driveReady && (
                <div style={{ color:'var(--danger)', fontSize:13, marginBottom:14, padding:'8px 12px', background:'rgba(224,64,64,0.1)', borderRadius:3, border:'1px solid rgba(224,64,64,0.3)' }}>
                  ⚠ Drive ainda não conectado. Aguarde...
                </div>
              )}

              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:14 }}>
                {/* áudio */}
                <label className={`upload-slot ${aiFiles.audio ? 'done' : ''}`}>
                  <div className="upload-slot-icon" style={{ color: aiFiles.audio ? 'var(--success)' : 'var(--muted)' }}>🎙</div>
                  <div className="upload-slot-info">
                    <div className="upload-slot-label">NARRAÇÃO *</div>
                    <div className="upload-slot-name">{aiFiles.audio?.name || 'audio.mp3 / .wav'}</div>
                  </div>
                  <input type="file" accept="audio/*" style={{ display:'none' }} onChange={e => handleFiles(e,'audio')}/>
                </label>

                {/* roteiro */}
                <label className={`upload-slot ${aiFiles.roteiro ? 'done' : ''}`}>
                  <div className="upload-slot-icon" style={{ color: aiFiles.roteiro ? 'var(--success)' : 'var(--muted)' }}>📄</div>
                  <div className="upload-slot-info">
                    <div className="upload-slot-label">ROTEIRO *</div>
                    <div className="upload-slot-name">{aiFiles.roteiro?.name || 'roteiro.txt'}</div>
                  </div>
                  <input type="file" accept=".txt" style={{ display:'none' }} onChange={e => handleFiles(e,'roteiro')}/>
                </label>

                {/* imagens */}
                <label className={`upload-slot ${aiFiles.images.length > 0 ? 'done' : ''}`}>
                  <div className="upload-slot-icon" style={{ color: aiFiles.images.length > 0 ? 'var(--success)' : 'var(--muted)' }}>🖼️</div>
                  <div className="upload-slot-info">
                    <div className="upload-slot-label">IMAGENS *</div>
                    <div className="upload-slot-name">{aiFiles.images.length > 0 ? `${aiFiles.images.length} imagens` : 'Selecionar todas'}</div>
                  </div>
                  <input type="file" multiple accept="image/*" style={{ display:'none' }} onChange={e => handleFiles(e,'images')}/>
                </label>

                {/* bgm */}
                <label className={`upload-slot ${aiFiles.bgm ? 'done' : ''}`}>
                  <div className="upload-slot-icon" style={{ color: aiFiles.bgm ? 'var(--success)' : 'var(--muted)' }}>🎵</div>
                  <div className="upload-slot-info">
                    <div className="upload-slot-label">MÚSICA DE FUNDO</div>
                    <div className="upload-slot-name">{aiFiles.bgm?.name || 'Opcional'}</div>
                  </div>
                  <input type="file" accept="audio/*" style={{ display:'none' }} onChange={e => handleFiles(e,'bgm')}/>
                </label>
              </div>

              {/* aviso sobre o Motor */}
              <div style={{ padding:'10px 12px', background:'rgba(45,107,228,0.08)', border:'1px solid rgba(45,107,228,0.2)', borderRadius:3, fontSize:12, color:'var(--muted)', marginBottom:14, lineHeight:1.6 }}>
                <strong style={{ color:'var(--accent2)' }}>Como funciona:</strong> Os arquivos serão enviados ao Google Drive na pasta <span className="mono" style={{ color:'var(--text)' }}>MotorDobra/fila/</span>. Com o Motor de Dobra 3.0 rodando no Colab, ele processará o job automaticamente e devolverá a timeline sincronizada.
              </div>

              {aiStatus.running && (
                <div style={{ marginBottom:14 }}>
                  <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6, fontSize:12 }}>
                    <span style={{ color:'var(--text)' }}>{aiStatus.msg}</span>
                    <span className="mono" style={{ color:'var(--accent2)' }}>{Math.round(aiStatus.pct)}%</span>
                  </div>
                  <div className="progress-bar"><div className="progress-fill" style={{ width:`${aiStatus.pct}%` }}/></div>
                </div>
              )}

              {aiStatus.error && (
                <div style={{ color:'var(--danger)', fontSize:12, marginBottom:10 }}>{aiStatus.error}</div>
              )}

              {aiStatus.step === 'aguardando' && (
                <div style={{ color:'var(--success)', fontSize:12, marginBottom:10 }}>
                  ✅ Job enviado com sucesso! Acompanhe o progresso em "📡 Jobs".
                </div>
              )}

              <div style={{ display:'flex', justifyContent:'flex-end', gap:8 }}>
                <button className="btn btn-ghost" onClick={() => setModal(null)} disabled={aiStatus.running}>Cancelar</button>
                <button className="btn btn-gold"
                  disabled={!driveReady || !aiFiles.audio || !aiFiles.roteiro || aiFiles.images.length === 0 || aiStatus.running}
                  onClick={enviaJob}>
                  {aiStatus.running ? '⟳ Enviando...' : '✦ Enviar ao Motor'}
                </button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ══════════════════════════════════════════════════════════════════
            MODAL: JOBS
      ══════════════════════════════════════════════════════════════════ */}
      {modal === 'jobs' && (
        <div className="modal-overlay" onClick={() => setModal(null)}>
          <div className="modal animate-fade" onClick={e => e.stopPropagation()} style={{ maxWidth:600 }}>
            <div className="modal-header">
              <span className="modal-title">📡 Jobs no Drive</span>
              <button className="btn btn-ghost" style={{ padding:'2px 6px' }} onClick={() => setModal(null)}>✕</button>
            </div>
            <div className="modal-body">
              {jobs.length === 0 && (
                <div style={{ color:'var(--muted)', textAlign:'center', padding:24, fontSize:13 }}>
                  Nenhum job encontrado.<br/>
                  <span style={{ fontSize:11 }}>Envie arquivos ao Motor para começar.</span>
                </div>
              )}
              {jobs.map(job => {
                const colors = { fila:'var(--muted)', processando:'var(--gold)', concluido:'var(--success)', erro:'var(--danger)' };
                const icons  = { fila:'⏳', processando:'⚙️', concluido:'✅', erro:'❌' };
                return (
                  <div key={job.id} style={{
                    display:'flex', alignItems:'center', gap:12, padding:'10px 12px',
                    background:'var(--bg)', border:'1px solid var(--border)', borderRadius:3, marginBottom:8,
                  }}>
                    <span style={{ fontSize:18 }}>{icons[job.status]}</span>
                    <div style={{ flex:1 }}>
                      <div style={{ fontFamily:'Share Tech Mono', fontSize:12, color:'var(--text)' }}>{job.name}</div>
                      <div style={{ fontSize:11, color: colors[job.status], marginTop:2, fontFamily:'Rajdhani', letterSpacing:0.5 }}>
                        {job.status.toUpperCase()}
                      </div>
                    </div>
                    {job.status === 'concluido' && (
                      <button className="btn btn-primary" style={{ fontSize:11, padding:'4px 10px' }}
                        onClick={() => { importaTimeline(job.id, job.name); setModal(null); }}>
                        ⬇ Importar Timeline
                      </button>
                    )}
                  </div>
                );
              })}
              <p style={{ fontSize:11, color:'var(--muted)', marginTop:8 }}>
                Atualiza automaticamente a cada 12 segundos. Pastas no Drive: <span className="mono">MotorDobra/fila · processando · concluido · erro</span>
              </p>
            </div>
          </div>
        </div>
      )}

      {/* ══════════════════════════════════════════════════════════════════
            MODAL: EXPORTAR
      ══════════════════════════════════════════════════════════════════ */}
      {modal === 'export' && (
        <div className="modal-overlay" onClick={() => setModal(null)}>
          <div className="modal animate-fade" onClick={e => e.stopPropagation()} style={{ maxWidth:420 }}>
            <div className="modal-header">
              <span className="modal-title">⬇ Exportar</span>
              <button className="btn btn-ghost" style={{ padding:'2px 6px' }} onClick={() => setModal(null)}>✕</button>
            </div>
            <div className="modal-body" style={{ display:'flex', flexDirection:'column', gap:10 }}>
              <p style={{ fontSize:12, color:'var(--muted)', marginBottom:4 }}>
                Escolha como exportar o projeto atual.
              </p>
              {/* Salvar JSON */}
              <button className="btn btn-ghost" style={{ justifyContent:'center', padding:'10px' }}
                onClick={() => {
                  const data = { clips, library: library.map(m => ({ ...m, url: undefined })), duration };
                  const blob = new Blob([JSON.stringify(data,null,2)], { type:'application/json' });
                  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                  a.download = 'projeto_cronicas.json'; a.click();
                }}>
                💾 Salvar Projeto (.JSON)
              </button>

              {/* Renderizar no Colab */}
              <button className="btn btn-primary" style={{ justifyContent:'center', padding:'10px' }}
                onClick={async () => {
                  try { await autenticaSeNecessario(); } catch { return; }
                  if (!driveReady) { alert('Drive não conectado.'); return; }
                  const videoClips = clips.filter(c => c.trackId === 'video-1');
                  const narClip    = clips.find(c => c.trackId === 'audio-1');
                  const bgmClip    = clips.find(c => c.trackId === 'audio-2');
                  if (videoClips.length === 0) { alert('Nenhuma imagem na timeline.'); return; }

                  const narMedia = narClip ? library.find(m => m.id === narClip.mediaId) : null;
                  const bgmMedia = bgmClip ? library.find(m => m.id === bgmClip.mediaId) : null;

                  if (!narMedia?.url) { alert('⚠️ Nenhum áudio de narração na timeline.\nAdicione o áudio na faixa Narração antes de renderizar.'); return; }

                  setRenderState({ isRendering: true, progress: 0, status: 'Criando job no Drive...' });
                  setModal(null);

                  try {
                    const jobName = `render_${Date.now()}`;
                    const jobId   = await driveApi.getOrCreateFolder(folderIds.fila, jobName);

                    // Usa fileCache para enviar arquivos originais sem fetch de blob
                    const getFile = async (media, nomeSaida) => {
                      const cached = fileCache.current[media.name];
                      if (cached) return new File([cached], nomeSaida || media.name, { type: cached.type });
                      if (media.url) {
                        const resp = await fetch(media.url);
                        const blob = await resp.blob();
                        return new File([blob], nomeSaida || media.name, { type: media.type });
                      }
                      return null;
                    };

                    // Envia imagens
                    for (let i = 0; i < videoClips.length; i++) {
                      const clip  = videoClips[i];
                      const media = library.find(m => m.id === clip.mediaId);
                      if (!media) continue;
                      setRenderState(p => ({ ...p, status: `Enviando imagem ${i+1}/${videoClips.length}...` }));
                      const file = await getFile(media, media.name);
                      if (file) await driveApi.uploadFile(jobId, file, media.name);
                    }

                    // Envia áudio narração
                    if (narClip) {
                      const narMedia = library.find(m => m.id === narClip.mediaId);
                      if (narMedia) {
                        setRenderState(p => ({ ...p, status: 'Enviando áudio...' }));
                        const ext  = narMedia.name.split('.').pop();
                        const file = await getFile(narMedia, `audio.${ext}`);
                        if (file) await driveApi.uploadFile(jobId, file, `audio.${ext}`);
                      }
                    }

                    // Envia BGM
                    if (bgmClip) {
                      const bgmMedia = library.find(m => m.id === bgmClip.mediaId);
                      if (bgmMedia) {
                        setRenderState(p => ({ ...p, status: 'Enviando música de fundo...' }));
                        const ext  = bgmMedia.name.split('.').pop();
                        const file = await getFile(bgmMedia, `bgm.${ext}`);
                        if (file) await driveApi.uploadFile(jobId, file, `bgm.${ext}`);
                      }
                    }

                    
                    // Envia timeline.json com os tempos, efeitos e filtros atuais
                    const tlData = {
                      tipo: 'render',
                      duracao_total: duration,
                      cenas: videoClips.map((clip, i) => {
                        const media = library.find(m => m.id === clip.mediaId);
                        return {
                          id_cena:    String(i+1).padStart(4,'0'),
                          arquivo:    media?.name || `${String(i+1).padStart(4,'0')}.jpg`,
                          start:      clip.startTime,
                          end:        clip.startTime + clip.duration,
                          duration:   clip.duration,
                          fit:        clip.fit || 'contain',
                          transition: clip.transition || 'none',
                          transition_duration: clip.transitionDuration ?? 0.8,
                          effect:     clip.effect || 'none',
                          filter:     clip.filter || 'none',
                          filter_intensity: clip.filterIntensity ?? 100
                        };
                      }),
                      audio: narClip ? ('audio.' + (library.find(m=>m.id===narClip.mediaId)?.name||'audio.mp3').split('.').pop()) : null,
                      audio_volume: narClip ? getClipVolume(narClip, 1.0) : 1.0,
                      audio_fade_in: narClip ? (narClip.fadeIn || 0) : 0,
                      audio_fade_out: narClip ? (narClip.fadeOut || 0) : 0,
                      bgm:   bgmClip ? ('bgm.'   + (library.find(m=>m.id===bgmClip.mediaId)?.name||'bgm.mp3').split('.').pop())   : null,
                      bgm_volume: bgmClip ? getClipVolume(bgmClip, 0.2) : 0.2,
                      bgm_fade_in: bgmClip ? (bgmClip.fadeIn || 0) : 0,
                      bgm_fade_out: bgmClip ? (bgmClip.fadeOut || 0) : 0,
                      bgm_ducking: true,
                    };
                    await driveApi.uploadJson(jobId, 'timeline_render.json', tlData);

                    await driveApi.uploadJson(jobId, 'job.json', {
                      tipo: 'render',
                      audio: tlData.audio,
                      roteiro: null,
                      timeline_pronta: 'timeline_render.json',
                      criado_em: new Date().toISOString(),
                    });

                    setModal(null);
                    alert('✅ Job de render enviado ao Motor de Dobra!\nAcompanhe em "📡 Jobs".');
                  } catch(e) {
                    alert('Erro ao enviar job: ' + e.message);
                  }
                }}>
                🚀 Renderizar no Colab (Motor de Dobra)
              </button>

              {/* Renderizar no Navegador FFmpeg */}
              <button className="btn btn-ghost" style={{ justifyContent:'center', padding:'10px' }}
                disabled={renderState.isRendering}
                onClick={async () => {
                  const videoClips = clips.filter(c => c.trackId === 'video-1').sort((a,b) => a.startTime - b.startTime);
                  const narClip    = clips.find(c => c.trackId === 'audio-1');
                  const bgmClip    = clips.find(c => c.trackId === 'audio-2');
                  if (videoClips.length === 0) { alert('Nenhuma imagem na timeline.'); return; }

                  setRenderState({ isRendering: true, progress: 0, status: 'Carregando FFmpeg...' });
                  let ffmpeg = null;
                  try {
                    const { createFFmpeg } = await import('https://esm.sh/@ffmpeg/ffmpeg@0.12.10');
                    const base = 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/esm';
                    const fb   = 'https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/esm';

                    setRenderState(p => ({ ...p, status: 'Baixando motor FFmpeg...' }));
                    const [coreURL, wasmURL] = await Promise.all([
                      fetch(`${base}/ffmpeg-core.js`).then(r=>r.blob()).then(b=>URL.createObjectURL(b)),
                      fetch(`${base}/ffmpeg-core.wasm`).then(r=>r.blob()).then(b=>URL.createObjectURL(b)),
                    ]);
                    const workerText = await fetch(`${fb}/worker.js`).then(r=>r.text());
                    const workerURL  = URL.createObjectURL(new Blob([workerText],{type:'text/javascript'}));

                    ffmpeg = createFFmpeg({ log: false, coreURL, wasmURL, workerURL });
                    await ffmpeg.load();

                    ffmpeg.on('log', ({ message }) => {
                      const m = message.match(/time=(\d{2}):(\d{2}):(\d{2})/);
                      if (m) {
                        const t = parseInt(m[1])*3600 + parseInt(m[2])*60 + parseInt(m[3]);
                        setRenderState(p => ({ ...p, progress: Math.min(99, Math.round(t/duration*100)), status: `Renderizando: ${Math.min(99,Math.round(t/duration*100))}%` }));
                      }
                    });

                    let listTxt = '';
                    for (let i = 0; i < videoClips.length; i++) {
                      const clip  = videoClips[i];
                      const media = library.find(m => m.id === clip.mediaId);
                      if (!media?.url) continue;
                      setRenderState(p => ({ ...p, status: `Preparando imagem ${i+1}/${videoClips.length}...` }));
                      const ext   = media.name.split('.').pop() || 'jpg';
                      const fname = `img${i}.${ext}`;
                      const cached = fileCache.current[media.name];
                      const buf   = cached ? await cached.arrayBuffer() : await fetch(media.url).then(r=>r.arrayBuffer());
                      await ffmpeg.writeFile(fname, new Uint8Array(buf));
                      const next = videoClips[i+1];
                      const dur  = next ? (next.startTime - clip.startTime) : (duration - clip.startTime);
                      listTxt += `file '${fname}'\nduration ${Math.max(0.1, dur).toFixed(3)}\n`;
                    }
                    const lastClip  = videoClips[videoClips.length-1];
                    const lastMedia = library.find(m => m.id === lastClip.mediaId);
                    if (lastMedia?.url) {
                      const ext = lastMedia.name.split('.').pop() || 'jpg';
                      listTxt += `file 'img${videoClips.length-1}.${ext}'\n`;
                    }
                    await ffmpeg.writeFile('list.txt', new TextEncoder().encode(listTxt));

                    let cmd = ['-f','concat','-safe','0','-i','list.txt'];
                    let filterParts = [];

                    if (narClip) {
                      const narMedia = library.find(m => m.id === narClip.mediaId);
                      if (narMedia) {
                        const cached = fileCache.current[narMedia.name];
                        const buf = cached ? await cached.arrayBuffer() : await fetch(narMedia.url).then(r=>r.arrayBuffer());
                        await ffmpeg.writeFile('narration.mp3', new Uint8Array(buf));
                        cmd.push('-i','narration.mp3');
                        filterParts.push(`[1:a]volume=${getClipVolume(narClip, 1.0).toFixed(3)}[a1]`);
                      }
                    }

                    if (bgmClip) {
                      const bgmMedia = library.find(m => m.id === bgmClip.mediaId);
                      if (bgmMedia) {
                        const cached = fileCache.current[bgmMedia.name];
                        const buf = cached ? await cached.arrayBuffer() : await fetch(bgmMedia.url).then(r=>r.arrayBuffer());
                        await ffmpeg.writeFile('bgm.mp3', new Uint8Array(buf));
                        cmd.push('-i','bgm.mp3');
                        const bgmInputIndex = narClip ? 2 : 1;
                        filterParts.push(`[${bgmInputIndex}:a]volume=${getClipVolume(bgmClip, 0.2).toFixed(3)}[bgm]`);
                      }
                    }

                    cmd.push('-vf','scale=1920:1080:force_original_aspect_ratio=decrease,pad=1920:1080:(ow-iw)/2:(oh-ih)/2,format=yuv420p');
                    cmd.push('-c:v','libx264','-preset','slow','-crf','23','-pix_fmt','yuv420p','-r','24');
                    cmd.push('-movflags','+faststart');

                    if (filterParts.length > 0) {
                      if (narClip && bgmClip) {
                        filterParts.push(`[a1][bgm]amix=inputs=2:duration=first:dropout_transition=0[aout]`);
                      }
                      cmd.push('-filter_complex', filterParts.join(';'));
                      cmd.push('-map','0:v','-map', narClip && bgmClip ? '[aout]' : (narClip ? '[a1]' : '[bgm]'),'-c:a','aac','-b:a','128k','-shortest');
                    }
                    cmd.push('saida.mp4');

                    setRenderState(p => ({ ...p, status: 'Renderizando vídeo...' }));
                    await ffmpeg.exec(cmd);

                    const data = await ffmpeg.readFile('saida.mp4');
                    const url  = URL.createObjectURL(new Blob([data.buffer],{type:'video/mp4'}));
                    const a    = document.createElement('a');
                    a.href = url; a.download = 'cronicas_estelares.mp4'; a.click();

                    setRenderState({ isRendering: false, progress: 100, status: '✅ Download iniciado!' });
                    setTimeout(() => setModal(null), 2000);
                  } catch(e) {
                    setRenderState({ isRendering: false, progress: 0, status: `Erro: ${e.message}` });
                  } finally {
                    try { ffmpeg?.terminate(); } catch {}
                  }
                }}>
                {renderState.isRendering ? `⏳ ${renderState.status}` : '💻 Renderizar no Navegador (FFmpeg)'}
              </button>

              {renderState.isRendering && (
                <div>
                  <div className="progress-bar" style={{ marginTop:4 }}>
                    <div className="progress-fill" style={{ width:`${renderState.progress}%` }}/>
                  </div>
                  <div style={{ fontSize:11, color:'var(--muted)', marginTop:4, textAlign:'center' }}>
                    {renderState.progress}% — {renderState.status}
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
