<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crônicas Estelares — Editor.</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg:        #04060f;
      --surface:   #080d1a;
      --panel:     #0c1525;
      --border:    #1a2a45;
      --accent:    #2d6be4;
      --accent2:   #00d4ff;
      --gold:      #f0a500;
      --text:      #c8d8f0;
      --muted:     #8aa8c8;
      --danger:    #e04040;
      --success:   #00c875;
      --track-vid: rgba(45,107,228,0.15);
      --track-nar: rgba(0,200,117,0.10);
      --track-bgm: rgba(0,212,255,0.10);
    }

    [data-theme="light"] {
      --bg:        #f8fafc;
      --surface:   #ffffff;
      --panel:     #f1f5f9;
      --border:    #94a3b8;
      --accent:    #2563eb;
      --accent2:   #0284c7;
      --gold:      #d97706;
      --text:      #0f172a;
      --muted:     #475569;
      --danger:    #dc2626;
      --success:   #16a34a;
      --track-vid: rgba(37,99,235,0.2);
      --track-nar: rgba(22,163,74,0.2);
      --track-bgm: rgba(14,165,233,0.2);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    #root { height: 100vh; display: flex; flex-direction: column; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    /* ── Glow utilities ── */
    .glow-accent { box-shadow: 0 0 12px rgba(45,107,228,0.4); }
    .glow-gold   { box-shadow: 0 0 12px rgba(240,165,0,0.4); }
    .glow-green  { box-shadow: 0 0 12px rgba(0,200,117,0.4); }

    /* ── HUD corners ── */
    .hud-box {
      position: relative;
      border: 1px solid var(--border);
      background: var(--panel);
    }
    .hud-box::before, .hud-box::after {
      content: '';
      position: absolute;
      width: 8px; height: 8px;
      border-color: var(--accent2);
      border-style: solid;
    }
    .hud-box::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
    .hud-box::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

    /* ── Inputs / Selects ── */
    .editor-select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 3px;
      font-family: 'Exo 2', sans-serif;
      font-size: 12px;
      outline: none;
      cursor: pointer;
      appearance: none;
    }
    .editor-select:focus { border-color: var(--accent); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 3px; border: none;
      font-family: 'Rajdhani', sans-serif; font-weight: 600;
      font-size: 13px; letter-spacing: 0.5px;
      cursor: pointer; transition: all 0.15s;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary {
      background: var(--accent); color: #fff;
      border: 1px solid rgba(45,107,228,0.6);
    }
    .btn-primary:hover:not(:disabled) {
      background: #3d7bf0;
      box-shadow: 0 0 16px rgba(45,107,228,0.5);
    }
    .btn-gold {
      background: transparent; color: var(--gold);
      border: 1px solid var(--gold);
    }
    .btn-gold:hover:not(:disabled) {
      background: rgba(240,165,0,0.1);
      box-shadow: 0 0 16px rgba(240,165,0,0.3);
    }
    .btn-ghost {
      background: transparent; color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover:not(:disabled) { color: var(--text); border-color: var(--accent); }
    .btn-danger {
      background: transparent; color: var(--danger);
      border: 1px solid rgba(224,64,64,0.4);
    }
    .btn-danger:hover:not(:disabled) { background: rgba(224,64,64,0.1); }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      width: 100%; max-width: 560px;
      max-height: 90vh; overflow-y: auto;
      position: relative;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(45,107,228,0.06);
    }
    .modal-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px; font-weight: 700;
      letter-spacing: 1px; color: var(--accent2);
      text-transform: uppercase;
    }
    .modal-body { padding: 20px 18px; }

    /* ── Upload slot ── */
    .upload-slot {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      cursor: pointer;
      transition: border-color 0.15s;
      margin-bottom: 8px;
    }
    .upload-slot:hover { border-color: var(--accent); }
    .upload-slot.done  { border-color: var(--success); }
    .upload-slot-icon {
      width: 32px; height: 32px; border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      background: var(--panel); flex-shrink: 0;
    }
    .upload-slot-info { flex: 1; overflow: hidden; }
    .upload-slot-label { font-size: 12px; color: var(--muted); font-family: 'Rajdhani', sans-serif; letter-spacing: 0.5px; }
    .upload-slot-name  { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── Progress bar ── */
    .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.3s; }

    /* ── Timeline track ── */
    .track-row { height: 48px; border-bottom: 1px solid var(--border); position: relative; }

    /* ── Mono text ── */
    .mono { font-family: 'Share Tech Mono', monospace; }

    /* ── Status dot ── */
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      display: inline-block; flex-shrink: 0;
    }
    .status-dot.online  { background: var(--success); box-shadow: 0 0 6px var(--success); animation: pulse 2s infinite; }
    .status-dot.offline { background: var(--muted); }
    .status-dot.working { background: var(--gold); box-shadow: 0 0 6px var(--gold); animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%        { opacity: 0.4; }
    }

    /* Animações e Filtros de Preview FFmpeg */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes kenburns {
      0%   { transform: scale(1) translate(0,0); }
      100% { transform: scale(1.15) translate(-2%,-2%); }
    }
    @keyframes kenburns2 {
      0%   { transform: scale(1.15) translate(2%,1%); }
      100% { transform: scale(1) translate(0,0); }
    }
    @keyframes zoom_in {
      0%   { transform: scale(1); }
      100% { transform: scale(1.2); }
    }
    @keyframes pan_right {
      0%   { transform: scale(1.1) translateX(-3%); }
      100% { transform: scale(1.1) translateX(3%); }
    }
    @keyframes pan_left {
      0%   { transform: scale(1.1) translateX(3%); }
      100% { transform: scale(1.1) translateX(-3%); }
    }
    
    @keyframes wipeleft {
      from { clip-path: inset(0 0 0 100%); }
      to   { clip-path: inset(0 0 0 0); }
    }
    @keyframes wiperight {
      from { clip-path: inset(0 100% 0 0); }
      to   { clip-path: inset(0 0 0 0); }
    }
    @keyframes wipeup {
      from { clip-path: inset(100% 0 0 0); }
      to   { clip-path: inset(0 0 0 0); }
    }
    @keyframes wipedown {
      from { clip-path: inset(0 0 100% 0); }
      to   { clip-path: inset(0 0 0 0); }
    }
    @keyframes diagtl { from { clip-path: polygon(0 0, 0 0, 0 0); } to { clip-path: polygon(0 0, 200% 0, 0 200%); } }
    @keyframes diagtr { from { clip-path: polygon(100% 0, 100% 0, 100% 0); } to { clip-path: polygon(100% 0, -100% 0, 100% 200%); } }
    @keyframes diagbl { from { clip-path: polygon(0 100%, 0 100%, 0 100%); } to { clip-path: polygon(0 100%, 200% 100%, 0 -100%); } }
    @keyframes diagbr { from { clip-path: polygon(100% 100%, 100% 100%, 100% 100%); } to { clip-path: polygon(100% 100%, -100% 100%, 100% -100%); } }
    @keyframes slideleft { from { transform: translateX(100%); } to { transform: translateX(0); } }
    @keyframes slideright { from { transform: translateX(-100%); } to { transform: translateX(0); } }
    @keyframes slideup { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes slidedown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
    @keyframes smoothleft { from { opacity: 0.25; transform: translateX(12%) scale(1.03); filter: blur(8px); } to { opacity: 1; transform: translateX(0) scale(1); filter: blur(0); } }
    @keyframes smoothright { from { opacity: 0.25; transform: translateX(-12%) scale(1.03); filter: blur(8px); } to { opacity: 1; transform: translateX(0) scale(1); filter: blur(0); } }
    @keyframes smoothup { from { opacity: 0.25; transform: translateY(12%) scale(1.03); filter: blur(8px); } to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); } }
    @keyframes smoothdown { from { opacity: 0.25; transform: translateY(-12%) scale(1.03); filter: blur(8px); } to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); } }
    @keyframes fadeblack { from { filter: brightness(0); } to { filter: brightness(1); } }
    @keyframes fadewhite { from { filter: brightness(10); } to { filter: brightness(1); } }
    @keyframes dissolve { from { opacity: 0; filter: blur(5px); } to { opacity: 1; filter: blur(0); } }
    @keyframes pixelize { from { opacity: 0; filter: blur(18px) contrast(2); image-rendering: pixelated; transform: scale(1.04); } to { opacity: 1; filter: blur(0) contrast(1); transform: scale(1); } }
    @keyframes radial { from { clip-path: circle(0% at 50% 50%); filter: saturate(1.8); } to { clip-path: circle(75% at 50% 50%); filter: saturate(1); } }
    @keyframes circleopen { from { clip-path: circle(0% at 50% 50%); } to { clip-path: circle(80% at 50% 50%); } }
    @keyframes circleclose { from { clip-path: circle(80% at 50% 50%); opacity: 0; } to { clip-path: circle(80% at 50% 50%); opacity: 1; } }
    @keyframes horzopen { from { clip-path: inset(0 50% 0 50%); } to { clip-path: inset(0 0 0 0); } }
    @keyframes horzclose { from { clip-path: inset(0 0 0 0); opacity: 0; } to { clip-path: inset(0 0 0 0); opacity: 1; } }
    @keyframes vertopen { from { clip-path: inset(50% 0 50% 0); } to { clip-path: inset(0 0 0 0); } }
    @keyframes vertclose { from { clip-path: inset(0 0 0 0); opacity: 0; } to { clip-path: inset(0 0 0 0); opacity: 1; } }
    @keyframes sliceh { from { clip-path: polygon(0 0, 100% 0, 100% 18%, 0 18%, 0 34%, 100% 34%, 100% 52%, 0 52%, 0 68%, 100% 68%, 100% 86%, 0 86%); transform: translateX(12%); opacity: 0; } to { clip-path: inset(0); transform: translateX(0); opacity: 1; } }
    @keyframes slicev { from { clip-path: polygon(0 0, 18% 0, 18% 100%, 34% 100%, 34% 0, 52% 0, 52% 100%, 68% 100%, 68% 0, 86% 0, 86% 100%, 100% 100%, 100% 0); transform: translateY(12%); opacity: 0; } to { clip-path: inset(0); transform: translateY(0); opacity: 1; } }

    @keyframes grain_dance {
      0% { transform: translate(0, 0); }
      20% { transform: translate(-2%, 2%); }
      40% { transform: translate(2%, -2%); }
      60% { transform: translate(-2%, -2%); }
      80% { transform: translate(2%, 2%); }
      100% { transform: translate(0, 0); }
    }

    .wrapper-grain::after {
      content: "";
      position: absolute;
      inset: -20%;
      width: 140%;
      height: 140%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='1'/%3E%3C/svg%3E");
      opacity: var(--grain-opacity, 0.4);
      mix-blend-mode: overlay;
      pointer-events: none;
      z-index: 5;
      animation: grain_dance 0.4s steps(4) infinite;
    }

    .wrapper-vignette::after {
      content: "";
      position: absolute;
      inset: 0;
      box-shadow: inset 0 0 calc(var(--filter-intensity) * 2px) rgba(0,0,0, 0.9);
      pointer-events: none;
      z-index: 5;
    }
    
    .animate-fade      { animation: fadeIn 0.3s ease; }
    .transition-fade   { animation: fadeIn var(--trans-dur, 0.8s) ease-in-out; }
    .transition-zoom   { animation: zoom_in var(--trans-dur, 0.8s) ease-out; }
    .transition-crossfade { animation: fadeIn var(--trans-dur, 0.8s) ease-in-out; }
    .transition-wipeleft  { animation: wipeleft var(--trans-dur, 0.8s) ease-in-out; }
    .transition-wiperight { animation: wiperight var(--trans-dur, 0.8s) ease-in-out; }
    .transition-wipeup { animation: wipeup var(--trans-dur, 0.8s) ease-in-out; }
    .transition-wipedown { animation: wipedown var(--trans-dur, 0.8s) ease-in-out; }
    .transition-diagtl { animation: diagtl var(--trans-dur, 0.8s) ease-in-out; }
    .transition-diagtr { animation: diagtr var(--trans-dur, 0.8s) ease-in-out; }
    .transition-diagbl { animation: diagbl var(--trans-dur, 0.8s) ease-in-out; }
    .transition-diagbr { animation: diagbr var(--trans-dur, 0.8s) ease-in-out; }
    .transition-slideleft { animation: slideleft var(--trans-dur, 0.8s) ease-out; }
    .transition-slideright { animation: slideright var(--trans-dur, 0.8s) ease-out; }
    .transition-slideup { animation: slideup var(--trans-dur, 0.8s) ease-out; }
    .transition-slidedown { animation: slidedown var(--trans-dur, 0.8s) ease-out; }
    .transition-smoothleft { animation: smoothleft var(--trans-dur, 0.8s) ease-out; }
    .transition-smoothright { animation: smoothright var(--trans-dur, 0.8s) ease-out; }
    .transition-smoothup { animation: smoothup var(--trans-dur, 0.8s) ease-out; }
    .transition-smoothdown { animation: smoothdown var(--trans-dur, 0.8s) ease-out; }
    .transition-fadeblack { animation: fadeblack var(--trans-dur, 0.8s) ease-in-out; }
    .transition-fadewhite { animation: fadewhite var(--trans-dur, 0.8s) ease-in-out; }
    .transition-dissolve { animation: dissolve var(--trans-dur, 0.8s) ease-in-out; }
    .transition-pixelize { animation: pixelize var(--trans-dur, 0.8s) steps(6) both; }
    .transition-radial { animation: radial var(--trans-dur, 0.8s) ease-in-out; }
    .transition-circleopen { animation: circleopen var(--trans-dur, 0.8s) ease-in-out; }
    .transition-circleclose { animation: circleclose var(--trans-dur, 0.8s) ease-in-out; }
    .transition-horzopen { animation: horzopen var(--trans-dur, 0.8s) ease-in-out; }
    .transition-horzclose { animation: horzclose var(--trans-dur, 0.8s) ease-in-out; }
    .transition-vertopen { animation: vertopen var(--trans-dur, 0.8s) ease-in-out; }
    .transition-vertclose { animation: vertclose var(--trans-dur, 0.8s) ease-in-out; }
    .transition-hlslice, .transition-hrslice { animation: sliceh var(--trans-dur, 0.8s) ease-in-out; }
    .transition-vuslice, .transition-vdslice { animation: slicev var(--trans-dur, 0.8s) ease-in-out; }
    
    .effect-kenburns   { animation: kenburns 12s linear forwards; }
    .effect-kenburns2  { animation: kenburns2 12s linear forwards; }
    .effect-zoom_in    { animation: zoom_in 12s linear forwards; }
    .effect-pan_right  { animation: pan_right 12s linear forwards; }
    .effect-pan_left   { animation: pan_left 12s linear forwards; }

  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

// ─── CONSTANTES ───────────────────────────────────────────────────────────────
const CLIENT_ID   = '825962387496-lccer4g2sijjktrp9k3q3uh9mkd30du4.apps.googleusercontent.com';
const SCOPE       = 'https://www.googleapis.com/auth/drive';
const MOTOR_ROOT  = 'MotorDobra';
const PPS         = 40; // pixels por segundo na timeline

const TRACKS = [
  { id: 'video-1', name: 'Vídeo / Imagens', color: 'var(--track-vid)', type: 'video' },
  { id: 'audio-1', name: 'Narração',         color: 'var(--track-nar)', type: 'audio' },
  { id: 'audio-2', name: 'Música de Fundo',  color: 'var(--track-bgm)', type: 'audio' },
];

const fmt = (s) => {
  const m  = Math.floor(s / 60);
  const ss = Math.floor(s % 60);
  const ms = Math.floor((s % 1) * 100);
  return `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}.${String(ms).padStart(2,'0')}`;
};

// ─── GOOGLE DRIVE API ─────────────────────────────────────────────────────────
const driveApi = {
  token: null,

  async getOrCreateFolder(parentId, name) {
    const q = `name='${name}' and mimeType='application/vnd.google-apps.folder' and '${parentId}' in parents and trashed=false`;
    const r = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name)`, {
      headers: { Authorization: `Bearer ${this.token}` }
    });
    const d = await r.json();
    if (d.files && d.files.length > 0) return d.files[0].id;
    const cr = await fetch('https://www.googleapis.com/drive/v3/files', {
      method: 'POST',
      headers: { Authorization: `Bearer ${this.token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, mimeType: 'application/vnd.google-apps.folder', parents: [parentId] })
    });
    const cd = await cr.json();
    return cd.id;
  },

  async uploadFile(folderId, file, name, onProgress) {
    console.log('uploadFile start', { folderId, name, type: file?.type, size: file?.size });
    const meta = JSON.stringify({ name: name || file.name, parents: [folderId] });
    const form = new FormData();
    form.append('metadata', new Blob([meta], { type: 'application/json' }));
    form.append('file', file);
    return new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,webViewLink');
      xhr.setRequestHeader('Authorization', `Bearer ${this.token}`);
      xhr.upload.onprogress = (e) => { if (e.lengthComputable && onProgress) onProgress(e.loaded / e.total); };
      xhr.onload  = () => {
        if (xhr.status < 300) {
          console.log('uploadFile success', { status: xhr.status, response: xhr.responseText });
          resolve(JSON.parse(xhr.responseText));
        } else {
          console.error('uploadFile failed', { status: xhr.status, statusText: xhr.statusText, response: xhr.responseText });
          reject(new Error(`Upload falhou: ${xhr.status} ${xhr.statusText} — ${xhr.responseText}`));
        }
      };
      xhr.onerror = () => {
        console.error('uploadFile network error', { folderId, name });
        reject(new Error('Erro de rede no upload'));
      };
      xhr.send(form);
    });
  },

  async uploadJson(folderId, name, data) {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const file = new File([blob], name, { type: 'application/json' });
    return this.uploadFile(folderId, file, name);
  },

  async listFolder(folderId) {
    const r = await fetch(
      `https://www.googleapis.com/drive/v3/files?q='${folderId}' in parents and trashed=false&fields=files(id,name,mimeType,modifiedTime)&orderBy=createdTime desc`,
      { headers: { Authorization: `Bearer ${this.token}` } }
    );
    const d = await r.json();
    return d.files || [];
  },

  async readJson(fileId) {
    const r = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
      headers: { Authorization: `Bearer ${this.token}` }
    });
    return r.json();
  },

  async getFileLink(fileId) {
    const r = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?fields=webViewLink,webContentLink`, {
      headers: { Authorization: `Bearer ${this.token}` }
    });
    return r.json();
  },

  async getRootId() {
    const r = await fetch('https://www.googleapis.com/drive/v3/files/root?fields=id', {
      headers: { Authorization: `Bearer ${this.token}` }
    });
    const d = await r.json();
    return d.id;
  }
};

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  // Auth
  const [authState, setAuthState]   = useState('idle'); // idle | loading | ok | error
  const [userInfo,  setUserInfo]    = useState(null);
  const tokenClientRef              = useRef(null);

  // Drive
  const [driveReady,  setDriveReady]  = useState(false);
  const [folderIds,   setFolderIds]   = useState({}); // { root, fila, concluido, erro }

  // UI modais
  const [modal, setModal] = useState(null); // null | 'ai' | 'export' | 'jobs'

  // IA / upload
  const [aiFiles,  setAiFiles]  = useState({ audio: null, roteiro: null, images: [], bgm: null });
  const [aiStatus, setAiStatus] = useState({ step: '', msg: '', pct: 0, running: false, error: '' });

  // Jobs no Drive
  const [jobs, setJobs] = useState([]);
  const pollRef         = useRef(null);

  // Timeline (editor)
  const [clips,       setClips]       = useState([]);
  const [library,     setLibrary]     = useState([]);
  const [duration,    setDuration]    = useState(60);
  const [currentTime, setCurrentTime] = useState(0);
  const [isPlaying,   setIsPlaying]   = useState(false);
  const [selectedId,  setSelectedId]  = useState(null);
  const [dragState,   setDragState]   = useState(null);
  const [dragMediaId, setDragMediaId] = useState(null);

  // Histórico Undo/Redo
  const [past,   setPast]   = useState([]);
  const [future, setFuture] = useState([]);

  const undo = useCallback(() => {
    setPast(p => {
      if (p.length === 0) return p;
      const newPast = [...p];
      const prevClips = newPast.pop();
      setClips(currentClips => { setFuture(f => [currentClips, ...f]); return prevClips; });
      return newPast;
    });
  }, []);

  const redo = useCallback(() => {
    setFuture(f => {
      if (f.length === 0) return f;
      const newFuture = [...f];
      const nextClips = newFuture.shift();
      setClips(currentClips => { setPast(p => [...p, currentClips]); return nextClips; });
      return newFuture;
    });
  }, []);

  const timelineRef  = useRef(null);
  const animRef      = useRef(null);
  const lastRef      = useRef(Date.now());
  const narrationRef = useRef(null);
  const bgmRef       = useRef(null);
  const fileCache    = useRef({}); // cache dos arquivos originais para re-upload

  // ── ESTADOS EXTRAS ──────────────────────────────────────────────────────────
  const [zoom,       setZoom]       = useState(1);    // zoom da timeline (1 = normal)
  const [snapOn,     setSnapOn]     = useState(true); // snap automático
  const [fullscreen, setFullscreen] = useState(false);// tela cheia do preview
  const [volumes,    setVolumes]    = useState({});   // volume por clip { clipId: 0-1 }
  const previewRef = useRef(null);

  const [renderState, setRenderState] = useState({ isRendering: false, progress: 0, status: '' });

  // Tema Claro / Escuro
  const [theme, setTheme] = useState(() => localStorage.getItem('cronicas_theme') || 'dark');
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('cronicas_theme', theme);
  }, [theme]);

  // Guias do Painel Direito
  const [rightPanelTab, setRightPanelTab] = useState('Ajustes');
  const [duckingEnabled, setDuckingEnabled] = useState(true);

  // Preview
  const [previewSrc, setPreviewSrc] = useState(null);

  const normalizeMediaName = (name) => String(name || '')
    .toLowerCase()
    .replace(/\.[^/.]+$/, '')
    .replace(/[_-]+/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();

  const reconnectMissingMedia = () => {
    const lookup = Object.fromEntries(
      library.filter(m => m.url && !m.placeholder).map(m => [normalizeMediaName(m.name), m.id])
    );

    setClips(prevClips => prevClips.map(clip => {
      const media = library.find(m => m.id === clip.mediaId);
      const key = normalizeMediaName(media?.name);
      const matchId = lookup[key];
      return matchId ? { ...clip, mediaId: matchId } : clip;
    }));

    setLibrary(prevLib => prevLib.map(m => {
      if (!m.placeholder) return m;
      const matchId = lookup[normalizeMediaName(m.name)];
      return matchId ? null : m;
    }).filter(Boolean));

    if (Object.keys(lookup).length > 0) {
      alert('✅ Reconexão concluída. Clips vinculados à mídia encontrada na biblioteca.');
    } else {
      alert('🔎 Não foi possível reconectar mídias automaticamente. Carregue a mídia correspondente na biblioteca.');
    }
  };

  // ── GOOGLE LOGIN ────────────────────────────────────────────────────────────
  const initGoogleAuth = useCallback(() => {
    if (!window.google) { setTimeout(initGoogleAuth, 500); return; }
    tokenClientRef.current = window.google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPE,
      callback: async (resp) => {
        if (resp.error) { setAuthState('error'); return; }
        driveApi.token = resp.access_token;
        setAuthState('ok');
        // Pega info do usuário
        try {
          const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
            headers: { Authorization: `Bearer ${resp.access_token}` }
          });
          setUserInfo(await r.json());
        } catch {}
        await setupDriveFolders();
      }
    });
  }, []);

  useEffect(() => { initGoogleAuth(); }, [initGoogleAuth]);

  const handleLogin = () => {
    setAuthState('loading');
    tokenClientRef.current?.requestAccessToken({ prompt: 'consent' });
  };

  // ── DRIVE: ESTRUTURA DE PASTAS ──────────────────────────────────────────────
  const setupDriveFolders = async () => {
    try {
      const rootId   = await driveApi.getRootId();
      const motorId  = await driveApi.getOrCreateFolder(rootId, 'MotorDobra');
      const filaId   = await driveApi.getOrCreateFolder(motorId, 'fila');
      const concId   = await driveApi.getOrCreateFolder(motorId, 'concluido');
      const erroId   = await driveApi.getOrCreateFolder(motorId, 'erro');
      const procId   = await driveApi.getOrCreateFolder(motorId, 'processando');
      setFolderIds({ root: rootId, motor: motorId, fila: filaId, concluido: concId, erro: erroId, processando: procId });
      setDriveReady(true);
      startPolling(concId, erroId, procId, filaId);
      // Pede permissão para notificações do sistema
      if (Notification.permission === 'default') Notification.requestPermission();
    } catch(e) {
      console.error('Erro ao configurar pastas Drive:', e);
    }
  };

  // ── POLLING: verifica jobs concluídos ───────────────────────────────────────
  const startPolling = (concId, erroId, procId, filaId) => {
    if (pollRef.current) clearInterval(pollRef.current);
    pollRef.current = setInterval(async () => {
      try {
        const [conc, erro, proc, fila] = await Promise.all([
          driveApi.listFolder(concId),
          driveApi.listFolder(erroId),
          driveApi.listFolder(procId),
          driveApi.listFolder(filaId),
        ]);
        const novosJobs = [
          ...fila.map(j => ({ ...j, status: 'fila' })),
          ...proc.map(j => ({ ...j, status: 'processando' })),
          ...conc.map(j => ({ ...j, status: 'concluido' })),
          ...erro.map(j => ({ ...j, status: 'erro' })),
        ];

        // Notificação sonora quando job passa para concluido
        setJobs(prevJobs => {
          const prevConcluidos = new Set(prevJobs.filter(j => j.status === 'concluido').map(j => j.id));
          const novosConcluidos = novosJobs.filter(j => j.status === 'concluido' && !prevConcluidos.has(j.id));
          if (novosConcluidos.length > 0) {
            // Toca beep de notificação
            try {
              const ctx = new (window.AudioContext || window.webkitAudioContext)();
              [0, 150, 300].forEach((delay, i) => {
                setTimeout(() => {
                  const osc  = ctx.createOscillator();
                  const gain = ctx.createGain();
                  osc.connect(gain); gain.connect(ctx.destination);
                  osc.frequency.value = [880, 1100, 1320][i];
                  gain.gain.setValueAtTime(0.3, ctx.currentTime);
                  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
                  osc.start(); osc.stop(ctx.currentTime + 0.3);
                }, delay);
              });
            } catch {}
            // Notificação do sistema se permitido
            if (Notification.permission === 'granted') {
              new Notification('✅ Motor de Dobra', { body: `Job concluído: ${novosConcluidos[0].name}` });
            }
          }
          return novosJobs;
        });
      } catch {}
    }, 12000);
  };

  useEffect(() => () => { if (pollRef.current) clearInterval(pollRef.current); }, []);

  // ── ENVIAR JOB PARA O MOTOR ─────────────────────────────────────────────────
  // Autentica sob demanda — só quando realmente precisa do Drive
  const autenticaSeNecessario = () => new Promise((resolve, reject) => {
    if (authState === 'ok' && driveApi.token) { resolve(); return; }
    setAuthState('loading');
    tokenClientRef.current?.requestAccessToken({
      prompt: driveApi.token ? '' : 'consent',
      callback: async (resp) => {
        if (resp.error) { setAuthState('error'); reject(new Error('Falha no login')); return; }
        driveApi.token = resp.access_token;
        setAuthState('ok');
        try {
          const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
            headers: { Authorization: `Bearer ${resp.access_token}` }
          });
          setUserInfo(await r.json());
        } catch {}
        if (!driveReady) await setupDriveFolders();
        resolve();
      }
    });
  });

  const enviaJob = async () => {
    if (!aiFiles.audio || !aiFiles.roteiro || aiFiles.images.length === 0) return;
    try { await autenticaSeNecessario(); } catch { return; }
    if (!driveReady) return;

    setAiStatus({ step: 'upload', msg: 'Criando pasta do job...', pct: 5, running: true, error: '' });

    try {
      const jobName = `job_${Date.now()}`;
      const jobId   = await driveApi.getOrCreateFolder(folderIds.fila, jobName);
      console.log('Job folder criado:', jobId, jobName);
      setAiStatus(p => ({ ...p, msg: `Pasta do job criada: ${jobName}`, pct: 10 }));

      // Upload áudio
      setAiStatus(p => ({ ...p, msg: 'Enviando áudio...', pct: 15 }));
      await driveApi.uploadFile(jobId, aiFiles.audio, 'audio.' + aiFiles.audio.name.split('.').pop(),
        (p) => setAiStatus(prev => ({ ...prev, pct: 15 + p * 20 })));

      // Upload roteiro
      setAiStatus(p => ({ ...p, msg: 'Enviando roteiro...', pct: 36 }));
      await driveApi.uploadFile(jobId, aiFiles.roteiro, 'roteiro.txt');

      // Upload imagens
      for (let i = 0; i < aiFiles.images.length; i++) {
        const img = aiFiles.images[i];
        const ext = img.name.split('.').pop();
        const num = String(i + 1).padStart(4, '0');
        setAiStatus(p => ({ ...p, msg: `Enviando imagem ${i+1}/${aiFiles.images.length}...`, pct: 38 + (i / aiFiles.images.length) * 40 }));
        await driveApi.uploadFile(jobId, img, `${num}.${ext}`);
      }

      // Upload BGM se existir
      if (aiFiles.bgm) {
        setAiStatus(p => ({ ...p, msg: 'Enviando música de fundo...', pct: 80 }));
        await driveApi.uploadFile(jobId, aiFiles.bgm, 'bgm.' + aiFiles.bgm.name.split('.').pop());
      }

      // Cria job.json
      setAiStatus(p => ({ ...p, msg: 'Criando instrução do job...', pct: 90 }));
      const jobJson = {
        tipo: 'timeline_e_render',
        nome_projeto: jobName,
        audio: 'audio.' + aiFiles.audio.name.split('.').pop(),
        roteiro: 'roteiro.txt',
        bgm: aiFiles.bgm ? 'bgm.' + aiFiles.bgm.name.split('.').pop() : null,
        total_imagens: aiFiles.images.length,
        criado_em: new Date().toISOString(),
      };
      await driveApi.uploadJson(jobId, 'job.json', jobJson);

      // Popula a biblioteca com os arquivos já carregados — evita re-upload manual
      const novasMedias = [];

      for (let i = 0; i < aiFiles.images.length; i++) {
        const f   = aiFiles.images[i];
        const url = URL.createObjectURL(f);
        const id  = `ai-img-${i}-${Date.now()}`;
        fileCache.current[f.name] = f;
        novasMedias.push({ id, name: f.name, type: f.type, url, duration: 5 });
      }

      if (aiFiles.audio) {
        const f   = aiFiles.audio;
        const url = URL.createObjectURL(f);
        const id  = `ai-audio-${Date.now()}`;
        fileCache.current[f.name] = f;
        const dur = await new Promise(res => {
          const a = document.createElement('audio');
          a.onloadedmetadata = () => res(a.duration);
          a.src = url;
        });
        novasMedias.push({ id, name: f.name, type: f.type, url, duration: dur });
      }

      if (aiFiles.bgm) {
        const f   = aiFiles.bgm;
        const url = URL.createObjectURL(f);
        const id  = `ai-bgm-${Date.now()}`;
        fileCache.current[f.name] = f;
        novasMedias.push({ id, name: f.name, type: f.type, url, duration: 5 });
      }

      if (novasMedias.length > 0) {
        setLibrary(prev => {
          // Evita duplicatas pelo nome
          const existentes = new Set(prev.map(m => m.name.toLowerCase()));
          const novas = novasMedias.filter(m => !existentes.has(m.name.toLowerCase()));
          return [...prev, ...novas];
        });
      }

      setAiStatus({ step: 'aguardando', msg: '✅ Job enviado! Arquivos adicionados à biblioteca. Aguardando o Motor processar...', pct: 100, running: false, error: '' });
      setModal(null);
      setAiFiles({ audio: null, roteiro: null, images: [], bgm: null });

    } catch(e) {
      console.error('Erro ao enviar job:', e);
      alert(`Erro ao enviar job. Veja console para detalhes.\n${e.message}`);
      setAiStatus({ step: 'erro', msg: '', pct: 0, running: false, error: `Erro: ${e.message}` });
    }
  };

  // ── IMPORTAR TIMELINE.JSON DO DRIVE ────────────────────────────────────────
  const importaTimeline = async (jobFolderId, jobName) => {
    try {
      const files = await driveApi.listFolder(jobFolderId);
      const tlFile = files.find(f => f.name === 'timeline.json');
      if (!tlFile) { alert('timeline.json não encontrado nesse job.'); return; }
      const tl = await driveApi.readJson(tlFile.id);

      const newClips     = [];
      const extraLibrary = [];

      // Usa setLibrary com callback para ter acesso à biblioteca atual
      setLibrary(prevLib => {
        // Índice nome→id da biblioteca já carregada
        const byName = {};
        prevLib.forEach(m => { byName[m.name.toLowerCase()] = m.id; });

        tl.cenas.forEach((cena, i) => {
          const nomeNorm = cena.arquivo.toLowerCase();
          let mediaId = byName[nomeNorm];

          // Se não achou, cria placeholder para mostrar nome na timeline
          if (!mediaId) {
            mediaId = `placeholder-${i}-${Date.now()}`;
            extraLibrary.push({
              id: mediaId, name: cena.arquivo,
              type: 'image/jpeg', url: null,
              duration: cena.duration, placeholder: true,
            });
            byName[nomeNorm] = mediaId;
          }

          newClips.push({
            id: `clip-${i}-${Date.now()}`,
            mediaId,
            trackId:    'video-1',
            startTime:  cena.start,
            duration:   cena.duration_real || cena.duration,
            offset: 0, fit: 'contain', transition: 'none', transitionDuration: 0.8, effect: 'none', filter: 'none', filterIntensity: 100, fadeIn: 0, fadeOut: 0, volume: 1.0
          });
        });

        // Adiciona áudio automaticamente se estiver na biblioteca
        const audioMedia = prevLib.find(m => m.type && m.type.startsWith('audio'));
        if (audioMedia) {
          newClips.push({
            id: `clip-audio-${Date.now()}`,
            mediaId:   audioMedia.id,
            trackId:   'audio-1',
            startTime: 0,
            duration:  tl.duracao_total,
            offset: 0, fit: 'contain', transition: 'none', transitionDuration: 0.8, effect: 'none', filter: 'none', filterIntensity: 100, fadeIn: 0, fadeOut: 0, volume: 1.0
          });
        }

        return extraLibrary.length > 0 ? [...prevLib, ...extraLibrary] : prevLib;
      });

      setPast([]);
      setFuture([]);
      setClips(newClips);
      setDuration(tl.duracao_total + 10);
      setCurrentTime(0);

      const faltando = extraLibrary.length;
      const msg = faltando > 0
        ? `✅ Timeline importada! ${tl.total_cenas} cenas | score: ${tl.score_medio}\n\n⚠️ ${faltando} imagens não encontradas na biblioteca.\nFaça upload pelo "+" para aparecerem no preview.`
        : `✅ Timeline importada! ${tl.total_cenas} cenas | score: ${tl.score_medio}`;
      alert(msg);

    } catch(e) {
      alert('Erro ao importar timeline: ' + e.message);
    }
  };

  // ── DRAG & DROP TIMELINE ────────────────────────────────────────────────────
  const onClipMouseDown = (e, clipId, type) => {
    e.stopPropagation();
    const clip = clips.find(c => c.id === clipId);
    setDragState({ id: clipId, type, startX: e.clientX, origStart: clip.startTime, origDur: clip.duration, origClips: clips });
    setSelectedId(clipId);
  };

  const getSnapTarget = (time, excludeId) => {
    let target = time;
    let minD = 1.5 / zoom; // Threshold responsivo ao zoom
    
    // Snap ao início absoluto da timeline
    if (Math.abs(time) < minD) {
      minD = Math.abs(time);
      target = 0;
    }
    
    // Snap a outros clips
    clips.forEach(c => {
      if (c.id === excludeId) return;
      [c.startTime, c.startTime + c.duration].forEach(t => {
        const d = Math.abs(time - t);
        if (d < minD) { minD = d; target = t; }
      });
    });

    // Snap à agulha de reprodução (Playhead vermelha)
    if (Math.abs(time - currentTime) < minD) {
      minD = Math.abs(time - currentTime);
      target = currentTime;
    }

    return { target, minD };
  };

  const onMouseMove = (e) => {
    if (!dragState) return;
    const pps = PPS * zoom;
    const delta = (e.clientX - dragState.startX) / pps;
    
    setClips(prev => prev.map(c => {
      if (c.id !== dragState.id) return c;
      
      if (dragState.type === 'move') {
        const rawStart = Math.max(0, dragState.origStart + delta);
        if (!snapOn) return { ...c, startTime: rawStart };

        const rawEnd = rawStart + dragState.origDur;
        
        // Verifica o que está mais perto: o início do clip colar em algo, ou o fim do clip colar em algo
        const snapStart = getSnapTarget(rawStart, c.id);
        const snapEnd = getSnapTarget(rawEnd, c.id);
        
        if (snapStart.minD <= snapEnd.minD && snapStart.minD < 1.5 / zoom) {
          return { ...c, startTime: snapStart.target };
        } else if (snapEnd.minD < 1.5 / zoom) {
          return { ...c, startTime: Math.max(0, snapEnd.target - dragState.origDur) };
        }
        return { ...c, startTime: rawStart };
      }
      
      if (dragState.type === 'resize-right') {
        const rawEnd = dragState.origStart + dragState.origDur + delta;
        const finalEnd = snapOn ? getSnapTarget(rawEnd, c.id).target : rawEnd;
        const nd = Math.max(0.1, finalEnd - dragState.origStart); // Bloqueia inversão de clip
        return { ...c, duration: nd };
      }
      
      if (dragState.type === 'resize-left') {
        const rawStart = Math.max(0, dragState.origStart + delta);
        const finalStart = snapOn ? getSnapTarget(rawStart, c.id).target : rawStart;
        const nd = Math.max(0.1, (dragState.origStart + dragState.origDur) - finalStart);
        if (finalStart >= dragState.origStart + dragState.origDur - 0.1) return c; // Bloqueia inversão
        return { ...c, startTime: finalStart, duration: nd };
      }
      
      return c;
    }));
  };

  const onMouseUp = () => {
    if (dragState) {
      const clip = clips.find(c => c.id === dragState.id);
      if (clip && (clip.startTime !== dragState.origStart || clip.duration !== dragState.origDur)) {
        setPast(p => [...p, dragState.origClips]);
        setFuture([]);
      }
    }
    setDragState(null);
  };

  const addClipToTimelineAt = (mediaId, trackId, startTime) => {
    const media = library.find(m => m.id === mediaId);
    if (!media) return;
    setPast(p => [...p, clips]);
    setFuture([]);
    const durationValue = media.duration || 5;
    const clip = {
      id: Math.random().toString(36).slice(2),
      mediaId,
      trackId,
      startTime: Math.max(0, startTime),
      duration: durationValue,
      offset: 0,
      fit: 'contain',
      transition: 'none',
      transitionDuration: 0.8,
      effect: 'none',
      filter: 'none',
      filterIntensity: 100,
      fadeIn: 0,
      fadeOut: 0,
      volume: trackId === 'audio-2' ? 0.2 : 1.0,
    };
    setClips(prev => {
      const next = [...prev, clip];
      if (clip.startTime + durationValue > duration) setDuration(clip.startTime + durationValue + 10);
      return next;
    });
  };

  const onTimelineDrop = (e) => {
    e.preventDefault();
    const mediaId = dragMediaId || e.dataTransfer.getData('text/plain');
    if (!mediaId) return;
    const media = library.find(m => m.id === mediaId);
    if (!media) return;
    const rect = timelineRef.current.getBoundingClientRect();
    const x = Math.max(0, e.clientX - rect.left + timelineRef.current.scrollLeft);
    const startTime = x / (PPS * zoom);
    const trackId = media.type?.startsWith('audio') ? 'audio-1' : 'video-1';
    addClipToTimelineAt(mediaId, trackId, startTime);
    setDragMediaId(null);
  };

  // ── PLAYBACK E ATUALIZAÇÃO ──────────────────────────────────────────────────
  const updateSelectedClip = (updates) => {
    setPast(p => [...p, clips]); setFuture([]);
    setClips(p => p.map(c => c.id === selectedId ? { ...c, ...updates } : c));
  };

  const updateDurationAndRipple = (id, newDuration) => {
    setPast(p => [...p, clips]); setFuture([]);
    setClips(prev => {
      const target = prev.find(c => c.id === id);
      if (!target) return prev;
      const delta = newDuration - target.duration;
      return prev.map(c => {
        if (c.id === id) return { ...c, duration: newDuration };
        // Se for na mesma trilha e estiver posicionado depois do clip alterado, ajusta o tempo (Ripple)
        if (snapOn && c.trackId === target.trackId && c.startTime > target.startTime + 0.01) {
           return { ...c, startTime: Math.max(0, c.startTime + delta) };
        }
        return c;
      });
    });
  };

  const applyToAllVideos = (updates) => {
    setPast(p => [...p, clips]); setFuture([]);
    setClips(p => p.map(c => c.trackId === 'video-1' ? { ...c, ...updates } : c));
  };

  const applyTransitionCycle = () => {
    const pool = [
      'crossfade', 'dissolve', 'smoothleft', 'smoothright',
      'wipeleft', 'wiperight', 'wipeup', 'wipedown',
      'radial', 'circleopen', 'pixelize', 'diagtl', 'diagbr'
    ];
    setPast(p => [...p, clips]);
    setFuture([]);
    setClips(prev => {
      let idx = 0;
      return prev.map(c => {
        if (c.trackId !== 'video-1') return c;
        const transition = idx === 0 ? 'none' : pool[(idx - 1) % pool.length];
        idx += 1;
        return {
          ...c,
          transition,
          transitionDuration: c.transitionDuration ?? 0.8,
        };
      });
    });
  };

  const getClipVolume = (clip, fallback = 1.0) => {
    if (!clip) return fallback;
    return clip.volume ?? volumes[clip.id] ?? fallback;
  };

  useEffect(() => {
    const narClip = clips.find(c => c.trackId === 'audio-1');
    const bgmClip = clips.find(c => c.trackId === 'audio-2');
    const narMedia = narClip ? library.find(m => m.id === narClip.mediaId) : null;
    const bgmMedia = bgmClip ? library.find(m => m.id === bgmClip.mediaId) : null;

    if (narrationRef.current) {
      if (narMedia?.url) {
        if (narrationRef.current.src !== narMedia.url) {
          narrationRef.current.src = narMedia.url;
          narrationRef.current.volume = getClipVolume(narClip, 1.0);
          narrationRef.current.onended = () => {
            setIsPlaying(false);
            setCurrentTime(0);
            if (bgmRef.current) { bgmRef.current.pause(); bgmRef.current.currentTime = 0; }
          };
        } else {
          narrationRef.current.volume = getClipVolume(narClip, 1.0);
        }
        const expTime = currentTime - (narClip?.startTime || 0);
        if (Math.abs(narrationRef.current.currentTime - expTime) > 0.3) {
          narrationRef.current.currentTime = Math.max(0, expTime);
        }
        if (isPlaying && narrationRef.current.paused) narrationRef.current.play().catch(()=>{});
        if (!isPlaying && !narrationRef.current.paused) narrationRef.current.pause();
      } else {
        narrationRef.current.pause();
      }
    }

    if (bgmRef.current) {
      if (bgmMedia?.url) {
        if (bgmRef.current.src !== bgmMedia.url) {
          bgmRef.current.src = bgmMedia.url;
          bgmRef.current.volume = getClipVolume(bgmClip, 0.2);
        }
        const expTime = currentTime - (bgmClip?.startTime || 0);
        if (Math.abs(bgmRef.current.currentTime - expTime) > 0.3) {
          bgmRef.current.currentTime = Math.max(0, expTime);
        }
        // Ducking: reduz BGM quando narração está tocando
        const narActive = clips.find(c => c.trackId === 'audio-1' && currentTime >= c.startTime && currentTime < c.startTime + c.duration);
        const bgmVol = getClipVolume(bgmClip, 0.2);
        bgmRef.current.volume = bgmVol * (duckingEnabled && narActive ? 0.3 : 1.0);

        if (isPlaying && bgmRef.current.paused) bgmRef.current.play().catch(()=>{});
        if (!isPlaying && !bgmRef.current.paused) bgmRef.current.pause();
      } else {
        bgmRef.current.pause();
      }
    }
  }, [isPlaying, currentTime, clips, library, volumes]);

  useEffect(() => {
    if (isPlaying) {
      const tick = () => {
        const now   = Date.now();
        const delta = (now - lastRef.current) / 1000;
        lastRef.current = now;
        
        // Calcula o final exato do último clipe na timeline
        const maxTime = clips.length > 0 ? Math.max(...clips.map(c => c.startTime + c.duration)) : duration;

        setCurrentTime(t => {
          if (t + delta >= maxTime) {
            setIsPlaying(false);
            if (narrationRef.current) narrationRef.current.pause();
            if (bgmRef.current) bgmRef.current.pause();
            return maxTime;
          }
          return t + delta;
        });
        animRef.current = requestAnimationFrame(tick);
      };
      lastRef.current = Date.now();
      animRef.current = requestAnimationFrame(tick);
    } else {
      cancelAnimationFrame(animRef.current);
    }
    return () => cancelAnimationFrame(animRef.current);
  }, [isPlaying, duration, clips]);

  // Preview da imagem ativa
  useEffect(() => {
    const active = clips.find(c => c.trackId === 'video-1' && currentTime >= c.startTime && currentTime < c.startTime + c.duration);
    if (active) {
      const media = library.find(m => m.id === active.mediaId);
      setPreviewSrc(media?.url || null);
    } else setPreviewSrc(null);
  }, [currentTime, clips, library]);

  // ── SALVAR / CARREGAR PROJETO LOCAL ────────────────────────────────────────
  const salvaProjetoLocal = () => {
    try {
      const projeto = {
        versao:   '3.0',
        salvo_em: new Date().toISOString(),
        duration,
        clips,
        library:  library.map(m => ({
          id:       m.id,
          name:     m.name,
          type:     m.type,
          duration: m.duration,
          placeholder: true,
        })),
      };
      localStorage.setItem('cronicas_projeto', JSON.stringify(projeto));
      localStorage.setItem('cronicas_salvo_em', new Date().toLocaleString('pt-BR'));
      alert('✅ Projeto salvo localmente!\nDa próxima vez clique em "Carregar Projeto" para restaurar a timeline.');
    } catch(e) {
      alert('Erro ao salvar: ' + e.message);
    }
  };

  const carregaProjetoLocal = () => {
    try {
      const raw = localStorage.getItem('cronicas_projeto');
      if (!raw) { alert('Nenhum projeto salvo encontrado.'); return; }
      const projeto = JSON.parse(raw);
      const salvoEm = localStorage.getItem('cronicas_salvo_em') || '?';

      if (!confirm(`Carregar projeto salvo em ${salvoEm}?\n\n⚠️ Isso vai substituir a timeline atual.\nAs imagens precisarão ser recarregadas pelo "+".`)) return;

      setPast([]);
      setFuture([]);
      setClips(projeto.clips || []);
      setLibrary(projeto.library || []);
      setDuration(projeto.duration || 60);
      setCurrentTime(0);

      const semUrl = (projeto.library || []).filter(m => m.placeholder).length;
      if (semUrl > 0) {
        alert(`✅ Timeline restaurada! ${projeto.clips?.length || 0} clips carregados.\n\n⚠️ ${semUrl} mídias precisam ser recarregadas.\nClique em "+" na biblioteca e selecione as imagens/áudio novamente — a timeline vai reconectá-los automaticamente pelo nome.`);
      } else {
        alert(`✅ Projeto restaurado com sucesso!`);
      }
    } catch(e) {
      alert('Erro ao carregar: ' + e.message);
    }
  };

  const [temProjetoSalvo, setTemProjetoSalvo] = useState(false);

  const createNewProject = () => {
    if (!confirm('Criar novo projeto? A timeline atual será perdida e o estado atual será redefinido.')) return;
    setPast([]); setFuture([]); setClips([]); setLibrary([]); setDuration(60);
    setCurrentTime(0); setSelectedId(null); setAiFiles({ audio: null, roteiro: null, images: [], bgm: null });
    localStorage.removeItem('cronicas_projeto');
    localStorage.removeItem('cronicas_salvo_em');
    setTemProjetoSalvo(false);
  };

  const handleLogout = () => {
    setAuthState('idle');
    setUserInfo(null);
    driveApi.token = null;
    setDriveReady(false);
    setFolderIds({});
    setJobs([]);
    if (pollRef.current) { clearInterval(pollRef.current); pollRef.current = null; }
  };

  useEffect(() => {
    const raw = localStorage.getItem('cronicas_projeto');
    setTemProjetoSalvo(!!raw);
  }, []);

  useEffect(() => {
    if (clips.length === 0) return;
    const interval = setInterval(() => {
      try {
        const projeto = {
          versao: '3.0',
          salvo_em: new Date().toISOString(),
          duration, clips,
          library: library.map(m => ({ id: m.id, name: m.name, type: m.type, duration: m.duration, placeholder: true })),
        };
        localStorage.setItem('cronicas_projeto', JSON.stringify(projeto));
        localStorage.setItem('cronicas_salvo_em', new Date().toLocaleString('pt-BR'));
        setTemProjetoSalvo(true);
      } catch(e) {}
    }, 2 * 60 * 1000);
    return () => clearInterval(interval);
  }, [clips, library, duration]);

  // ── ATALHOS DE TECLADO ──────────────────────────────────────────────────────
  useEffect(() => {
    const handler = (e) => {
      const tag = e.target.tagName.toLowerCase();
      if (tag === 'input' || tag === 'select' || tag === 'textarea') return;

      switch(e.code) {
        case 'KeyZ':
          if (e.ctrlKey) { e.preventDefault(); if (e.shiftKey) redo(); else undo(); }
          break;
        case 'KeyY':
          if (e.ctrlKey) { e.preventDefault(); redo(); }
          break;
        case 'Space':
          e.preventDefault();
          setIsPlaying(p => !p);
          break;
        case 'Delete':
        case 'Backspace':
          if (selectedId) {
            setPast(p => [...p, clips]); setFuture([]);
            setClips(prev => {
              const clipToDelete = prev.find(c => c.id === selectedId);
              let nextClips = prev.filter(c => c.id !== selectedId);
              if (clipToDelete && snapOn) {
                const delta = -clipToDelete.duration;
                nextClips = nextClips.map(c => {
                  if (c.trackId === clipToDelete.trackId && c.startTime > clipToDelete.startTime) {
                    return { ...c, startTime: Math.max(0, c.startTime + delta) };
                  }
                  return c;
                });
              }
              return nextClips;
            });
            setSelectedId(null);
          }
          break;
        case 'Escape':
          setSelectedId(null);
          setFullscreen(false);
          break;
        case 'KeyF':
          setFullscreen(p => !p);
          break;
        case 'Home':
          e.preventDefault();
          setIsPlaying(false);
          setCurrentTime(0);
          break;
        case 'Equal': // Ctrl++ zoom in
          if (e.ctrlKey) { e.preventDefault(); setZoom(z => Math.min(z + 0.25, 4)); }
          break;
        case 'Minus': // Ctrl+- zoom out
          if (e.ctrlKey) { e.preventDefault(); setZoom(z => Math.max(z - 0.25, 0.25)); }
          break;
        case 'Digit0': // Ctrl+0 reset zoom
          if (e.ctrlKey) { e.preventDefault(); setZoom(1); }
          break;
        case 'ArrowLeft':
          e.preventDefault();
          setCurrentTime(t => Math.max(0, t - (e.shiftKey ? 5 : 1)));
          break;
        case 'ArrowRight':
          e.preventDefault();
          setCurrentTime(t => Math.min(duration, t + (e.shiftKey ? 5 : 1)));
          break;
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [selectedId, duration, clips, undo, redo]);

  // ── TELA CHEIA ───────────────────────────────────────────────────────────────
  useEffect(() => {
    const handleFsChange = () => {
      setFullscreen(!!document.fullscreenElement);
    };
    document.addEventListener('fullscreenchange', handleFsChange);
    return () => document.removeEventListener('fullscreenchange', handleFsChange);
  }, []);

  useEffect(() => {
    if (!previewRef.current) return;
    if (fullscreen && !document.fullscreenElement) {
      previewRef.current.requestFullscreen?.().catch(() => {
        console.warn("A tela cheia foi bloqueada ou não é suportada neste ambiente.");
        setFullscreen(false);
      });
    } else if (!fullscreen && document.fullscreenElement) {
      document.exitFullscreen?.().catch(() => {});
    }
  }, [fullscreen]);

  // ── RECONECTA MÍDIAS DA BIBLIOTECA PELO NOME ────────────────────────────────
  useEffect(() => {
    if (library.length === 0) return;
    setClips(prevClips => prevClips.map(clip => {
      const currentMedia = library.find(m => m.id === clip.mediaId);
      if (currentMedia?.url) return clip;
      const byName = library.find(m => m.url && !m.placeholder && m.name.toLowerCase() === (currentMedia?.name || '').toLowerCase());
      if (byName) return { ...clip, mediaId: byName.id };
      return clip;
    }));
  }, [library]);

  // ── FILE INPUT HELPER ───────────────────────────────────────────────────────
  const handleFiles = async (e, type) => {
    const input = e.target;
    const files = Array.from(input.files || []);
    if (!files.length) return;
    if (type === 'images') {
      const sorted = files.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));
      setAiFiles(p => ({ ...p, images: sorted }));
    } else {
      setAiFiles(p => ({ ...p, [type]: files[0] }));
    }
    if (type === 'images') {
      const imgs = files.sort((a,b) => a.name.localeCompare(b.name,undefined,{numeric:true}));
      const newLib = imgs.map((f,i) => ({
        id: `local-img-${i}-${Date.now()}`,
        name: f.name,
        type: f.type,
        url: URL.createObjectURL(f),
        duration: 5,
      }));
      imgs.forEach(f => { fileCache.current[f.name] = f; });
      setLibrary(prev => [...prev, ...newLib]);
    }
    input.value = '';
  };

  const motorStatus = () => {
    const proc = jobs.filter(j => j.status === 'processando').length;
    const fila  = jobs.filter(j => j.status === 'fila').length;
    if (proc > 0) return { dot: 'working', label: `Processando ${proc} job(s)` };
    if (fila > 0) return { dot: 'online',  label: `${fila} job(s) na fila` };
    if (driveReady) return { dot: 'online', label: 'Motor conectado' };
    return { dot: 'offline', label: 'Desconectado' };
  };

  const mStatus = motorStatus();
  const selectedClip = clips.find(c => c.id === selectedId);
  const missingPlaceholders = library.filter(m => m.placeholder).length;

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100vh' }}
         onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseUp}>

      {/* ── HEADER ── */}
      <header style={{
        display:'flex', alignItems:'center', justifyContent:'space-between',
        padding:'0 16px', height:44,
        background:'var(--surface)', borderBottom:'1px solid var(--border)',
        flexShrink:0,
      }}>
        <div style={{ display:'flex', alignItems:'center', gap:12 }}>
          <span style={{ fontFamily:'Rajdhani', fontWeight:700, fontSize:15, letterSpacing:2, color:'var(--accent2)' }}>
            CRÔNICAS ESTELARES
          </span>
          <span style={{ fontFamily:'Share Tech Mono', fontSize:10, color:'var(--muted)' }}>v3.0</span>
          <div style={{ display:'flex', alignItems:'center', gap:6, marginLeft:8 }}>
            <span className={`status-dot ${mStatus.dot}`}></span>
            <span style={{ fontFamily:'Share Tech Mono', fontSize:10, color:'var(--muted)' }}>{mStatus.label}</span>
          </div>
        </div>

        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <button className="btn btn-ghost" style={{ fontSize:14, padding:'4px 8px' }} 
            onClick={() => setTheme(t => t === 'dark' ? 'light' : 'dark')}
            title="Alternar Tema Claro/Escuro">
            {theme === 'dark' ? '☀️' : '🌙'}
          </button>
          {userInfo ? (
            <>
              <span style={{ fontSize:11, color:'var(--muted)', fontFamily:'Share Tech Mono' }}
                title="Atalhos: Espaço=Play/Pause | Delete=Remover | F=Tela Cheia | Home=Início | ←→=Navegar | Ctrl+/- =Zoom">
                {userInfo.email} · ⌨️
              </span>
              <button className="btn btn-ghost" style={{ fontSize:11 }} onClick={handleLogout} title="Desconectar do Google Drive">🚪 Sair</button>
            </>
          ) : (
            <button className="btn btn-ghost" style={{ fontSize:11 }}
              onClick={() => autenticaSeNecessario().catch(()=>{})}
              title="Conectar ao Google Drive">
              {authState === 'loading' ? '⟳' : '🔑'} {authState === 'loading' ? 'Conectando...' : 'Drive'}
            </button>
          )}
          <button className="btn btn-ghost" style={{ fontSize:11 }} onClick={createNewProject} title="Criar novo projeto">✨ Novo</button>
          <button className="btn btn-ghost" style={{ fontSize:11 }} onClick={carregaProjetoLocal}
            title={temProjetoSalvo ? `Projeto salvo: ${localStorage.getItem('cronicas_salvo_em')||''}` : 'Nenhum projeto salvo'}>
            {temProjetoSalvo ? '📂 Carregar' : '📂'}
          </button>
          <button className="btn btn-ghost" style={{ fontSize:11 }} onClick={salvaProjetoLocal}>
            💾 Salvar
          </button>
          <button className="btn btn-ghost" style={{ fontSize:11 }}
            onClick={async () => {
              if (authState !== 'ok') { try { await autenticaSeNecessario(); } catch { return; } }
              setModal('jobs');
            }}>
            📡 Jobs ({jobs.length})
          </button>
          <button className="btn btn-gold" onClick={() => setModal('ai')}>
            ✦ Enviar ao Motor
          </button>
          <button className="btn btn-primary" onClick={() => setModal('export')}>
            ⬇ Exportar
          </button>
        </div>
      </header>

      {/* ── CORPO PRINCIPAL ── */}
      <div style={{ display:'flex', flex:1, overflow:'hidden' }}>

        {/* ── BIBLIOTECA ── */}
        <div className="hud-box" style={{ width:200, display:'flex', flexDirection:'column', borderRadius:0, borderTop:'none', borderLeft:'none', borderBottom:'none' }}>
          <div style={{ padding:'8px 10px', borderBottom:'1px solid var(--border)', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <span style={{ fontFamily:'Rajdhani', fontSize:11, letterSpacing:1, color:'var(--muted)' }}>BIBLIOTECA</span>
            <label style={{ cursor:'pointer', color:'var(--accent)', fontSize:12 }} title="Importar mídia">
              +
              <input type="file" multiple accept="video/*,image/*,audio/*" style={{ display:'none' }} onChange={async (e) => {
                const newMedias = [];
                for (const f of Array.from(e.target.files)) {
                  const url = URL.createObjectURL(f);
                  const dur = await new Promise(res => {
                    if (f.type.startsWith('image')) return res(5);
                    const m = document.createElement(f.type.startsWith('video') ? 'video' : 'audio');
                    m.onloadedmetadata = () => res(m.duration);
                    m.src = url;
                  });
                  newMedias.push({ id: Math.random().toString(36).slice(2), name: f.name, type: f.type, url, duration: dur });
                }
                Array.from(e.target.files).forEach(f => { fileCache.current[f.name] = f; });

                setLibrary(prev => {
                  const semPlaceholder = prev.filter(m => {
                    if (!m.placeholder) return true;
                    return !newMedias.find(n => n.name.toLowerCase() === m.name.toLowerCase());
                  });
                  setClips(prevClips => prevClips.map(clip => {
                    const placeholder = prev.find(m => m.placeholder && m.id === clip.mediaId);
                    if (!placeholder) return clip;
                    const nova = newMedias.find(n => n.name.toLowerCase() === placeholder.name.toLowerCase());
                    if (nova) return { ...clip, mediaId: nova.id };
                    return clip;
                  }));
                  return [...semPlaceholder, ...newMedias];
                });
              }}/>
            </label>
            {missingPlaceholders > 0 && (
              <button className="btn btn-ghost" style={{ fontSize:11, padding:'4px 8px' }} onClick={reconnectMissingMedia}>
                🔄 Reconectar
              </button>
            )}
          </div>
          <div style={{ flex:1, overflowY:'auto', padding:6 }}>
            {library.length === 0 && (
              <div style={{ color:'var(--muted)', fontSize:11, textAlign:'center', padding:16 }}>Nenhuma mídia</div>
            )}
            {library.map(m => (
              <div key={m.id} draggable
                   onDragStart={e => {
                     e.dataTransfer.setData('text/plain', m.id);
                     setDragMediaId(m.id);
                   }}
                   onDragEnd={() => setDragMediaId(null)}
                   onClick={() => {
                     setPast(p => [...p, clips]); setFuture([]);
                     const trackId = m.type.startsWith('audio') ? 'audio-1' : 'video-1';
                     const lastEnd = clips.filter(c => c.trackId === trackId).reduce((max, c) => Math.max(max, c.startTime + c.duration), 0);
                     setClips(prev => [...prev, { id: Math.random().toString(36).slice(2), mediaId: m.id, trackId, startTime: lastEnd, duration: m.duration, offset:0, fit:'contain', transition:'none', transitionDuration: 0.8, effect:'none', filter:'none', filterIntensity: 100, fadeIn:0, fadeOut:0, volume: trackId === 'audio-2' ? 0.2 : 1.0 }]);
                     if (lastEnd + m.duration > duration) setDuration(lastEnd + m.duration + 10);
                   }} style={{
                     display:'flex', alignItems:'center', gap:6, padding:'5px 6px',
                     background:'var(--bg)', border:'1px solid var(--border)', borderRadius:2,
                     marginBottom:4, cursor:'pointer', fontSize:11,
                   }}>
                <span>{m.type.startsWith('video') ? '🎬' : m.type.startsWith('audio') ? '🎵' : '🖼️'}</span>
                <span style={{ overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', color:'var(--text)' }}>{m.name}</span>
              </div>
            ))}
          </div>
        </div>

        {/* ── AUDIO ELEMENTS ── */}
        <audio ref={narrationRef} style={{ display:'none' }} />
        <audio ref={bgmRef}       style={{ display:'none' }} />

        {/* ── PREVIEW ── */}
        <div ref={previewRef} style={{ flex: 1, background: fullscreen ? '#000' : 'var(--panel)', padding: fullscreen ? '0px' : '6px', display: 'flex' }}>
          
          <div style={{ 
            flex: 1, 
            containerType: 'size', 
            display: 'flex', 
            alignItems: 'center', 
            justifyContent: 'center',
            minHeight: 0,
            minWidth: 0
          }}>
            
            <div style={{
              position: 'relative',
              aspectRatio: '16 / 9',
              width: '100cqw', 
              maxWidth: 'calc(100cqh * 16 / 9)', 
              maxHeight: '100cqh',
              background: '#000', 
              border: fullscreen ? 'none' : '1px solid var(--border)',
              boxShadow: fullscreen ? 'none' : (theme === 'dark' ? '0 8px 32px rgba(0,0,0,0.5)' : '0 8px 32px rgba(0,0,0,0.15)'),
              borderRadius: fullscreen ? '0px' : '4px',
              overflow: 'hidden',
              flexShrink: 0
            }}>
              
              <div 
                className={
                  (clips.find(c => c.trackId === 'video-1' && currentTime >= c.startTime && currentTime < c.startTime + c.duration)?.filter === 'grain') ? 'wrapper-grain' : 
                  (clips.find(c => c.trackId === 'video-1' && currentTime >= c.startTime && currentTime < c.startTime + c.duration)?.filter === 'vignette') ? 'wrapper-vignette' : ''
                }
                style={{ 
                  position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center',
                  '--grain-opacity': (clips.find(c => c.trackId === 'video-1' && currentTime >= c.startTime && currentTime < c.startTime + c.duration)?.filterIntensity ?? 100) / 100,
                  '--filter-intensity': (clips.find(c => c.trackId === 'video-1' && currentTime >= c.startTime && currentTime < c.startTime + c.duration)?.filterIntensity ?? 100)
                }}
              >
                {previewSrc ? (
                  (() => {
                    const activeClip  = clips.find(c => c.trackId === 'video-1' && currentTime >= c.startTime && currentTime < c.startTime + c.duration);
                    const effect      = activeClip?.effect || 'none';
                    const transition  = activeClip?.transition || 'none';
                    const filter      = activeClip?.filter || 'none';
                    const intensity   = activeClip?.filterIntensity ?? 100;
                    const fitStyle    = activeClip?.fit || 'contain';
                    
                    let effectClass = '';
                    if (effect === 'kenburns') effectClass = Math.floor(activeClip.startTime) % 2 === 0 ? 'effect-kenburns' : 'effect-kenburns2';
                    else if (effect !== 'none') effectClass = `effect-${effect}`;

                    let transClass = '';
                    if (transition && transition !== 'none') {
                      transClass = `transition-${transition}`;
                    }
                    
                    let filterStyle = 'none';
                    if (filter === 'grayscale') filterStyle = `grayscale(${intensity}%)`;
                    if (filter === 'sepia') filterStyle = `sepia(${intensity}%)`;
                    if (filter === 'blur') filterStyle = `blur(${intensity / 10}px)`; // 0 a 10px
                    if (filter === 'contrast') filterStyle = `contrast(${100 + intensity}%)`; // 100% a 200%
                    if (filter === 'saturate') filterStyle = `saturate(${100 + intensity * 2}%)`; // 100% a 300%
                    if (filter === 'invert') filterStyle = `invert(${intensity}%)`;
                    if (filter === 'huerotate') filterStyle = `hue-rotate(${intensity * 3.6}deg)`; // 0 a 360deg
                    
                    const transDur = activeClip?.transitionDuration ?? 0.8;

                    return (
                      <div key={activeClip?.id} className={transClass} style={{ width:'100%', height:'100%', '--trans-dur': `${transDur}s`, overflow: 'hidden' }}>
                        <img src={previewSrc} alt="preview"
                          className={effectClass}
                          style={{ width:'100%', height:'100%', objectFit: fitStyle, filter: filterStyle }} />
                        {activeClip && (
                          <div style={{ position:'absolute', left:12, bottom:12, padding:'6px 10px', background:'rgba(0,0,0,0.55)', borderRadius:4, color:'#fff', fontSize:11, zIndex:12 }}>
                            <div style={{ fontWeight:700 }}>{library.find(m => m.id === activeClip.mediaId)?.name || 'Clip ativo'}</div>
                            <div>{Math.max(0, activeClip.duration).toFixed(1)}s</div>
                          </div>
                        )}
                      </div>
                    );
                  })()
                ) : (
                  <div style={{ color:'var(--muted)', textAlign:'center' }}>
                    <div style={{ fontSize:32, marginBottom:8 }}>📺</div>
                    <div style={{ fontFamily:'Share Tech Mono', fontSize:11 }}>SEM SINAL</div>
                  </div>
                )}
              </div>
              
              <div className="mono" style={{ position:'absolute', top:10, right:12, background:'rgba(0,0,0,0.7)', padding:'3px 8px', fontSize:12, color:'var(--accent2)', borderRadius:2, zIndex: 10 }}>
                {fmt(currentTime)}
              </div>
            </div>
          </div>
        </div>

        {/* ── PAINEL DIREITO (AJUSTES, EFEITOS, FILTROS, TRANSIÇÕES, ÁUDIO) ── */}
        <div className="hud-box" style={{ width:260, display:'flex', flexDirection:'column', borderRadius:0, borderTop:'none', borderRight:'none', borderBottom:'none' }}>
          <div style={{ display:'flex', flexWrap:'wrap', borderBottom:'1px solid var(--border)', background:'var(--bg)' }}>
            {['Ajustes', 'Efeitos', 'Filtros', 'Transições', 'Áudio'].map(tab => (
              <button 
                key={tab}
                style={{ 
                  flex:'1 1 30%', 
                  padding:'8px 0px', 
                  fontSize:10, 
                  border:'none', 
                  borderBottom: rightPanelTab === tab ? '2px solid var(--accent)' : '2px solid transparent',
                  color: rightPanelTab === tab ? 'var(--text)' : 'var(--muted)',
                  background: rightPanelTab === tab ? 'var(--panel)' : 'transparent',
                  cursor: 'pointer',
                  fontFamily: 'Rajdhani',
                  fontWeight: 600,
                  transition: 'all 0.2s',
                  textTransform: 'uppercase',
                  letterSpacing: 0.5
                }}
                onClick={() => setRightPanelTab(tab)}
              >
                {tab}
              </button>
            ))}
          </div>
          <div style={{ flex:1, overflowY:'auto', padding:'16px', display:'flex', flexDirection:'column', gap:'16px' }}>
            {!selectedClip ? (
              <div style={{ color:'var(--muted)', fontSize:12, textAlign:'center', marginTop:20 }}>
                Selecione um clip na timeline para editar.
              </div>
            ) : (
              <>
                {/* GUIA AJUSTES */}
                {rightPanelTab === 'Ajustes' && (
                  <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
                    <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                      <label style={{ fontSize:11, color:'var(--muted)', fontWeight:600 }}>DURAÇÃO DO CLIP (Segundos)</label>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                        <input type="number" min="0.1" step="0.1"
                          value={Number(selectedClip.duration).toFixed(1)}
                          onChange={e => {
                            const val = parseFloat(e.target.value);
                            if (!isNaN(val) && val > 0) updateDurationAndRipple(selectedId, val);
                          }}
                          style={{ width: '60px', background: 'var(--bg)', border: '1px solid var(--border)', color: 'var(--text)', padding: '6px 8px', borderRadius: 3, fontFamily: 'Share Tech Mono', fontSize: 13 }}
                        />
                        <button className="btn btn-ghost" style={{ padding: '4px 8px', flex:1, fontSize: 11 }} onClick={() => updateDurationAndRipple(selectedId, Math.max(0.1, selectedClip.duration - 0.5))} title="Diminuir">- 0.5s</button>
                        <button className="btn btn-ghost" style={{ padding: '4px 8px', flex:1, fontSize: 11 }} onClick={() => updateDurationAndRipple(selectedId, selectedClip.duration + 0.5)} title="Aumentar">+ 0.5s</button>
                      </div>
                    </div>

                    {selectedClip.trackId === 'video-1' && (
                      <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                        <label style={{ fontSize:11, color:'var(--muted)', fontWeight:600 }}>ENQUADRAMENTO DA IMAGEM</label>
                        <select className="editor-select" value={selectedClip.fit || 'contain'} onChange={e => updateSelectedClip({ fit: e.target.value })}>
                          <option value="contain">Ajustar (Mostra a imagem inteira)</option>
                          <option value="cover">Preencher (Corta para cobrir a tela)</option>
                        </select>
                        <button className="btn btn-ghost" style={{ fontSize:11, marginTop:2, justifyContent:'center' }} onClick={() => applyToAllVideos({ fit: selectedClip.fit || 'contain' })}>✦ Aplicar a todos</button>
                      </div>
                    )}
                  </div>
                )}

                {/* GUIA EFEITOS */}
                {rightPanelTab === 'Efeitos' && selectedClip.trackId === 'video-1' && (
                  <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                    <label style={{ fontSize:11, color:'var(--muted)', fontWeight:600 }}>EFEITO DE CÂMARA</label>
                    <select className="editor-select" value={selectedClip.effect || 'none'} onChange={e => updateSelectedClip({ effect: e.target.value })}>
                      <option value="none">Nenhum (Estático)</option>
                      <option value="kenburns">Ken Burns (Zoom/Pan Suave)</option>
                      <option value="zoom_in">Zoom In Rápido</option>
                      <option value="pan_right">Pan para a Direita</option>
                      <option value="pan_left">Pan para a Esquerda</option>
                    </select>
                    <button className="btn btn-ghost" style={{ fontSize:11, marginTop:8, justifyContent:'center' }} onClick={() => applyToAllVideos({ effect: selectedClip.effect })}>✦ Aplicar a todos</button>
                  </div>
                )}
                {rightPanelTab === 'Efeitos' && selectedClip.trackId !== 'video-1' && (
                  <div style={{ color:'var(--muted)', fontSize:11, textAlign:'center' }}>Opção não disponível para áudio.</div>
                )}

                {/* GUIA FILTROS */}
                {rightPanelTab === 'Filtros' && selectedClip.trackId === 'video-1' && (
                  <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                    <label style={{ fontSize:11, color:'var(--muted)', fontWeight:600 }}>FILTRO DE COR</label>
                    <select className="editor-select" value={selectedClip.filter || 'none'} onChange={e => updateSelectedClip({ filter: e.target.value })}>
                      <option value="none">Original</option>
                      <option value="grayscale">Preto e Branco</option>
                      <option value="sepia">Sépia (Vintage)</option>
                      <option value="blur">Desfoque (Blur)</option>
                      <option value="contrast">Alto Contraste</option>
                      <option value="saturate">Saturação (Cores Vibrantes)</option>
                      <option value="vignette">Vinheta Dramática</option>
                      <option value="invert">Negativo (Visão Raio-X)</option>
                      <option value="huerotate">Matiz Alienígena</option>
                      <option value="grain">Granulado (Film Grain)</option>
                    </select>
                    
                    {selectedClip.filter && selectedClip.filter !== 'none' && (
                      <div style={{ marginTop: 8 }}>
                        <label style={{ fontSize:11, color:'var(--muted)', display:'flex', justifyContent:'space-between', fontWeight:600 }}>
                          <span>INTENSIDADE</span>
                          <span className="mono">{selectedClip.filterIntensity ?? 100}%</span>
                        </label>
                        <input type="range" min="0" max="100" step="1" style={{ width:'100%', marginTop:8, accentColor:'var(--accent2)' }}
                          value={selectedClip.filterIntensity ?? 100}
                          onChange={e => updateSelectedClip({ filterIntensity: parseInt(e.target.value, 10) })}
                        />
                      </div>
                    )}
                    
                    <button className="btn btn-ghost" style={{ fontSize:11, marginTop:8, justifyContent:'center' }} onClick={() => applyToAllVideos({ filter: selectedClip.filter, filterIntensity: selectedClip.filterIntensity ?? 100 })}>✦ Aplicar a todos</button>
                  </div>
                )}
                {rightPanelTab === 'Filtros' && selectedClip.trackId !== 'video-1' && (
                  <div style={{ color:'var(--muted)', fontSize:11, textAlign:'center' }}>Opção não disponível para áudio.</div>
                )}

                {/* GUIA TRANSIÇÕES */}
                {rightPanelTab === 'Transições' && selectedClip.trackId === 'video-1' && (
